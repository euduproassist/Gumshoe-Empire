<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gumshoe Empire | Production Launcher</title>
    
    <!-- Optimized Font Loading: Pre-warmed connection for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Lexend:wght@800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. PRODUCTION ENVIRONMENT VARIABLES
           ========================================================================== */
        :root {
            --ui-black: #000000;
            --ui-charcoal: #0a0a0a;
            --ui-fluid-green: #4cb016;
            --ui-green-glow: #63d91f;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
            
            --transition-smooth: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--ui-black);
            font-family: 'Fredoka', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden !important;
            color: #ffffff;
        }

        /* ==========================================================================
           2. FLUID UI ENGINE
           ========================================================================== */
        .viewport-container {
            width: 100%;
            height: 100%;
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-areas: "main";
            overflow: hidden;
            position: relative;
        }

        .stage {
            grid-area: main;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: var(--safe-area-top) 1fr var(--safe-area-bottom);
            padding-left: var(--safe-area-left);
            padding-right: var(--safe-area-right);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            z-index: 1;
            box-sizing: border-box;
        }

        .stage.is-active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            z-index: 10;
        }

        /* Adaptive Background Architecture */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: -1;
            background-color: var(--ui-charcoal);
        }

        /* Layout Grid for UI Elements */
        .ui-slot {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: clamp(16px, 6vh, 60px);
            padding-left: clamp(12px, 4vw, 24px);
            padding-right: clamp(12px, 4vw, 24px);
            width: 100%;
            max-width: min(500px, 92vw);
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* ==========================================================================
           3. UI COMPONENT MODULES
           ========================================================================== */
        .loading-tip {
            margin-bottom: clamp(6px, 1.8vh, 12px);
            text-align: center;
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(12px, 2.2vw, 18px);
            line-height: 1.3;
            text-shadow: 2px 2px 5px rgba(0,0,0,.75);
            max-width: 100%;
            word-wrap: break-word;
        }

        .loading-text {
            margin-bottom: clamp(8px, 2vh, 14px);
            text-align: center;
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 2.6vw, 20px);
            line-height: 1.2;
            text-shadow: 2px 2px 5px rgba(0,0,0,.75);
        }
        
        .loading-meter-container {
            width: min(85%, 400px);
            height: clamp(18px, 3vh, 24px);
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2d2116;
            border-radius: 12px;
            padding: 3px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .loading-meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--ui-fluid-green), var(--ui-green-glow));
            border-radius: 8px;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px rgba(76, 176, 22, 0.6);
        }

        .cta-button {
            width: min(90%, 400px);
            max-width: 400px;
            padding: clamp(12px, 2.2vh, 18px) clamp(16px, 4vw, 24px);
            margin: clamp(6px, 1.2vh, 10px) 0;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-weight: 800;
            font-size: clamp(0.9rem, 2.2vw, 1.1rem);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .cta-button:active { transform: scale(0.96); }

        .btn-guest {
            background: linear-gradient(180deg, #72c613, #4a9405);
            color: #fff;
            border-bottom: 4px solid #1b4903;
        }

        .btn-google {
            background: #fff;
            color: #3c4043;
            border-bottom: 4px solid #999;
        }

        /* ==========================================================================
           4. ADAPTIVE RESPONSIVE BREAKPOINTS
           ========================================================================== */
        
        /* Ultra-Small Devices & Foldables Closed (width <= 360px) */
        @media screen and (max-width: 360px) {
            .ui-slot {
                padding-bottom: max(12px, var(--safe-area-bottom));
                max-width: 100%;
            }
            .loading-meter-container {
                width: 95%;
                height: 18px;
            }
            .cta-button {
                width: 100%;
                padding: 12px 14px;
            }
        }

        /* Tablets & Foldables Open (600px - 1024px in Portrait) */
        @media screen and (min-width: 600px) and (orientation: portrait) {
            .ui-slot {
                max-width: 520px;
                padding-bottom: clamp(40px, 10vh, 90px);
            }
            .cta-button {
                width: 100%;
                max-width: 440px;
            }
            .loading-meter-container {
                width: 100%;
                max-width: 440px;
            }
        }

        /* Desktop & Ultrawide Displays (min-width: 1025px) */
        @media screen and (min-width: 1025px) {
            .ui-slot {
                max-width: 480px;
                padding-bottom: clamp(40px, 8vh, 80px);
            }
            .cta-button {
                width: 100%;
                max-width: 400px;
            }
        }

        /* Landscape Mode - Mobile & Short Screens (max-height: 500px) */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .ui-slot {
                padding-bottom: max(8px, var(--safe-area-bottom));
                max-width: min(550px, 85vw);
            }
            .loading-tip {
                margin-bottom: 4px;
                font-size: clamp(11px, 2.8vh, 14px);
            }
            .loading-text {
                margin-bottom: 6px;
                font-size: clamp(12px, 3vh, 15px);
            }
            .loading-meter-container {
                height: 16px;
                width: min(80%, 360px);
            }
            .cta-button {
                padding: 8px 16px;
                margin: 4px 0;
                font-size: clamp(0.8rem, 3.5vh, 0.95rem);
                max-width: 320px;
            }
        }

        /* Landscape Mode - Tablets & Large Screens (min-height: 501px and orientation: landscape) */
        @media screen and (min-height: 501px) and (orientation: landscape) {
            .ui-slot {
                padding-bottom: clamp(24px, 6vh, 60px);
                max-width: 480px;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container" id="app-root">
        <!-- Splash -->
        <section class="stage is-active" id="screen-splash">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/napo_studio.png" class="bg-layer" alt="Splash Background">
        </section>

        <!-- Loading -->
        <section class="stage" id="screen-loading">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/loading_bg.png" class="bg-layer" alt="Loading Background">
            <div class="ui-slot">
                
    <div class="loading-tip">
        💡 Tip: Check every detail. The truth is always in the evidence.
    </div>

    <div class="loading-text" id="loading-text">
        Loading...
    </div>
                <div class="loading-meter-container">
                    <div class="loading-meter-fill" id="meter-fill"></div>
                </div>
            </div>
        </section>

        <!-- Menu -->
        <section class="stage" id="screen-menu">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/menu.png" class="bg-layer" alt="Menu Background">
            <div class="ui-slot">
                <button class="cta-button btn-guest" role="button" aria-label="Play as guest" tabindex="0">Play As Guest</button>
                <button class="cta-button btn-google" role="button" aria-label="Sign in with Google" tabindex="0">Sign In With Google</button>
            </div>
        </section>

        <!-- Profile Setup -->
       <section class="stage" id="screen-profile">
                <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/profile_setup.png" class="bg-layer" alt="Profile Background">
                <div class="ui-slot">
                <!-- Profile inputs will be dynamically handled by main.js -->
                <input type="text" id="detective-name-input" placeholder="Enter Name" style="display:none;">
                <button class="cta-button btn-guest" id="save-profile-btn" style="display:none;">Save Profile</button>
            </div>
        </section>
    </div>

    <script>
        const AppEngine = {
            init: () => {
                const splash = document.getElementById('screen-splash');
                const loading = document.getElementById('screen-loading');
                const menu = document.getElementById('screen-menu');
                const meter = document.getElementById('meter-fill');
                const loadingText = document.getElementById('loading-text');

                let dots = 0;

                setInterval(() => {
                dots = (dots + 1) % 3;
                loadingText.textContent = "Loading" + ".".repeat(dots + 1);
                }, 350);

                setTimeout(() => {
                    splash.classList.remove('is-active');
                    loading.classList.add('is-active');
                    
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 1.5;
                        meter.style.width = `${progress}%`;
                        if (progress >= 100) {
                            clearInterval(interval);
                            loading.classList.remove('is-active');
                            menu.classList.add('is-active');
                        }
                    }, 40);
                }, 2500);
            }
        };

        window.onload = AppEngine.init;
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
