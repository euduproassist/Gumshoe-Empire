<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAPO STUDIOS</title>

    <style>
        /* ==========================================================================
           1. ZERO-HORIZONTAL SCROLL RESET & LAYOUT BASE
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            min-height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            
            /* Strictly prevents sideways horizontal scrolling while allowing standard vertical scroll */
            overflow-x: hidden;
            overflow-y: auto;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==========================================================================
           2. RESPONSIVE CONTAINER & STAGE VIEWPORT
           ========================================================================== */
        .stage-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #000000;
            position: relative;
        }

        .studio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 650px;
            user-select: none;
        }

        /* ==========================================================================
           3. LOGO DISPLAY (100% MATCH TO PHOTO)
           ========================================================================== */
        .napo-logo-graphic {
            width: clamp(240px, 65vw, 420px);
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            
            /* Soft ambient backlight drop shadow matching image lighting */
            filter: drop-shadow(0px 0px 25px rgba(212, 175, 55, 0.25));
        }

        /* ==========================================================================
           4. MOBILE ORIENTATION SCALING
           ========================================================================== */
        @media screen and (orientation: portrait) and (max-width: 768px) {
            .studio-card {
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>

    <main class="stage-viewport">
        <div class="studio-card">
            
            <!-- 100% Identical Logo Asset -->
            <img 
                src="1000168114_5.png" 
                alt="NAPO STUDIOS Logo" 
                class="napo-logo-graphic"
            >

        </div>
    </main>

    <script>
        /* ==========================================================================
           5. AUTOMATIC LANDSCAPE ORIENTATION HANDLER
           ========================================================================== */
        async function applyLandscapeMode() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (error) {
                // Browsers require a user gesture (tap/click) before locking orientation
                console.log('Landscape lock ready upon user interaction.');
            }
        }

        // Listens for touch or tap anywhere on screen to trigger landscape lock on mobile devices
        document.addEventListener('touchstart', applyLandscapeMode, { once: true });
        document.addEventListener('click', applyLandscapeMode, { once: true });
    </script>
</body>
</html>
