<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAPO STUDIOS</title>

    <!-- Google Typography for Luxury Metallic Serif & Display Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. HARD CORE DISPLAY & ZERO-HORIZONTAL SCROLL RESET
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; /* Absolute block against sideways scrolling on any device */
            overflow-y: auto;   /* Permits normal vertical scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================================================
           2. MAIN CONTAINER & LANDSCAPE ROTATION HANDLING
           ========================================================================== */
        .stage-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: #000000;
        }

        .studio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 700px;
            user-select: none;
        }

        /* ==========================================================================
           3. MONOGRAM "NS" LOGO EMBLEM
           ========================================================================== */
        .monogram-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .monogram-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(80px, 18vw, 150px);
            font-weight: 900;
            letter-spacing: -12px;
            line-height: 0.9;
            text-transform: uppercase;
            
            /* Realistic Multi-Stop Gold Foil & Metal Sheen Gradient */
            background: linear-gradient(
                135deg, 
                #8a6012 0%, 
                #b88a28 15%, 
                #e8cb73 30%, 
                #ffffff 45%, 
                #e0c160 55%, 
                #ab7d1a 75%, 
                #5e3e00 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Deep Ambient Gold Glow Shadow */
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.9)) 
                    drop-shadow(0px 0px 25px rgba(212, 175, 55, 0.35));
        }

        /* Ambient background lighting directly behind the monogram */
        .monogram-box::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================================
           4. GLOWING DIVIDER LINES WITH LENS FLARE SPOTS
           ========================================================================== */
        .gold-line {
            position: relative;
            width: clamp(200px, 60vw, 420px);
            height: 1px;
            background: linear-gradient(
                90deg, 
                rgba(212, 175, 55, 0) 0%, 
                rgba(255, 230, 140, 0.85) 50%, 
                rgba(212, 175, 55, 0) 100%
            );
            margin: 4px 0;
        }

        /* Center Lens Flare Spot on Lines */
        .gold-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 
                0 0 6px 2px #ffffff,
                0 0 16px 5px rgba(255, 215, 0, 0.9),
                0 0 30px 10px rgba(212, 175, 55, 0.6);
        }

        /* ==========================================================================
           5. "NAPO STUDIOS" BRAND NAME TYPOGRAPHY
           ========================================================================== */
        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(18px, 4vw, 36px);
            font-weight: 800;
            letter-spacing: clamp(6px, 1.5vw, 14px);
            text-transform: uppercase;
            margin: 16px 0;
            padding-left: clamp(6px, 1.5vw, 14px); /* Balancing letter-spacing alignment */
            
            /* Vertical Metallic Gold Gradient */
            background: linear-gradient(
                180deg, 
                #ffffff 0%, 
                #fbeaa6 20%, 
                #cfa333 55%, 
                #855b0f 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.95));
        }

        /* ==========================================================================
           6. RESPONSIVE LANDSCAPE AUTOMATION STYLES
           ========================================================================== */
        @media screen and (orientation: portrait) and (max-width: 900px) {
            /* Encourages automatic landscape view feel on portrait mobile orientation */
            .studio-card {
                transform: scale(0.9);
            }
        }
    </style>
</head>
<body>

    <main class="stage-viewport" id="mainStage">
        <div class="studio-card">
            
            <!-- Metallic Gold Monogram Logo -->
            <div class="monogram-box">
                <h1 class="monogram-text">NS</h1>
            </div>

            <!-- Top Glowing Line -->
            <div class="gold-line"></div>

            <!-- Brand Name -->
            <h2 class="brand-text">NAPO STUDIOS</h2>

            <!-- Bottom Glowing Line -->
            <div class="gold-line"></div>

        </div>
    </main>

    <script>
        // Automatic Landscape Orientation Lock Handler
        async function forceLandscapeOrientation() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                // Browsers requiring user interaction first will fail gracefully without breaking UI layout
                console.log('Orientation lock requires full screen user action.');
            }
        }

        // Trigger orientation request on click/touch anywhere on page
        document.addEventListener('click', forceLandscapeOrientation);
        document.addEventListener('touchstart', forceLandscapeOrientation);
    </script>
</body>
</html>
