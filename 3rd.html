<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAPO STUDIOS</title>

    <!-- Google Fonts for Brand Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE CSS RESET & DISPLAY CORE
           ========================================================================== */
        html, body, div, span, applet, object, iframe,
        h1, h2, h3, h4, h5, h6, p, blockquote, pre,
        a, abbr, acronym, address, big, cite, code,
        del, dfn, em, img, ins, kbd, q, s, samp,
        small, strike, strong, sub, sup, tt, var,
        b, u, i, center, dl, dt, dd, ol, ul, li,
        fieldset, form, label, legend, table, caption,
        tbody, tfoot, thead, tr, th, td, article, aside,
        canvas, details, embed, figure, figcaption, footer,
        header, hgroup, menu, nav, output, ruby, section,
        summary, time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
        }

        article, aside, details, figcaption, figure, 
        footer, header, hgroup, menu, nav, section {
            display: block;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================================================
           2. VIEWPORT & OVERFLOW MANAGEMENT
           ========================================================================== */
        html {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #000000;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            width: 100%;
            min-height: 100vh;
            max-width: 100vw;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ==========================================================================
           3. MASTER STAGE CONTAINER
           ========================================================================== */
        .stage-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(10px, 4vw, 40px);
            position: relative;
            background: radial-gradient(circle at center, #070707 0%, #000000 100%);
            z-index: 1;
        }

        .studio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        /* ==========================================================================
           4. INLINE VECTOR MONOGRAM EMBLEM
           ========================================================================== */
        .monogram-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: clamp(10px, 3vw, 20px);
            width: 100%;
        }

        .monogram-svg {
            width: clamp(230px, 46vw, 400px);
            height: auto;
            max-height: 52vh;
            filter: drop-shadow(0px 12px 28px rgba(0, 0, 0, 0.98)) 
                    drop-shadow(0px 0px 22px rgba(212, 175, 55, 0.22));
            transition: transform 0.4s ease;
        }

        /* Backlight Ambient Glow */
        .monogram-container::before {
            content: '';
            position: absolute;
            width: clamp(180px, 35vw, 320px);
            height: clamp(180px, 35vw, 320px);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================================
           5. METALLIC DIVIDER LINES & CENTRAL LENS FLARE
           ========================================================================== */
        .gold-line {
            position: relative;
            width: clamp(200px, 62vw, 480px);
            height: 1px;
            background: linear-gradient(
                90deg, 
                rgba(212, 175, 55, 0) 0%, 
                rgba(255, 230, 140, 0.85) 50%, 
                rgba(212, 175, 55, 0) 100%
            );
            margin: clamp(4px, 1.2vw, 10px) 0;
            z-index: 2;
        }

        .gold-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 
                0 0 6px 2px #ffffff,
                0 0 16px 5px rgba(255, 215, 0, 0.9),
                0 0 30px 10px rgba(212, 175, 55, 0.6);
        }

        /* ==========================================================================
           6. BRAND TYPOGRAPHY
           ========================================================================== */
        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(18px, 4.2vw, 38px);
            font-weight: 800;
            letter-spacing: clamp(6px, 1.6vw, 16px);
            text-transform: uppercase;
            margin: clamp(10px, 2.5vw, 20px) 0;
            padding-left: clamp(6px, 1.6vw, 16px);
            z-index: 2;
            
            background: linear-gradient(
                180deg, 
                #ffffff 0%, 
                #fbeaa6 25%, 
                #cfa333 60%, 
                #7a520a 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.95));
        }

        /* ==========================================================================
           7. AUTOMATIC MOBILE LANDSCAPE OVERLAY
           ========================================================================== */
        .rotate-prompt {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.96);
            z-index: 99999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .rotate-icon {
            width: 45px;
            height: 45px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            animation: rotateSim 2s infinite ease-in-out;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        @keyframes rotateSim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        @media screen and (max-width: 768px) and (orientation: portrait) {
            .rotate-prompt {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <main class="stage-viewport">
        <div class="studio-card">
            
            <!-- Inlined Vector Monogram (No External Image Files Required) -->
            <div class="monogram-container">
                <svg class="monogram-svg" viewBox="0 0 450 480" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Main Gold Foil Gradient -->
                        <linearGradient id="napoGoldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#5B3F08"/>
                            <stop offset="15%" stop-color="#9C721D"/>
                            <stop offset="30%" stop-color="#DDB95B"/>
                            <stop offset="45%" stop-color="#FFF5BD"/>
                            <stop offset="60%" stop-color="#CAA13E"/>
                            <stop offset="80%" stop-color="#80560F"/>
                            <stop offset="100%" stop-color="#402700"/>
                        </linearGradient>

                        <!-- Bevel Highlight Edge Gradient -->
                        <linearGradient id="napoBevelGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
                            <stop offset="50%" stop-color="#DDB95B" stop-opacity="0.3"/>
                            <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
                        </linearGradient>

                        <!-- Subtle Inner Bevel Shadow -->
                        <filter id="innerBevelShadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
                            <feOffset dx="2" dy="4"/>
                            <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
                            <feFlood flood-color="#000" flood-opacity="0.75"/>
                            <feComposite in2="shadowDiff" operator="in"/>
                            <feComposite in2="SourceGraphic" operator="over"/>
                        </filter>
                    </defs>

                    <!-- Exact Geometry Grouping for Interlocking NS Emblem -->
                    <g fill="url(#napoGoldMetal)" stroke="url(#napoBevelGlow)" stroke-width="1.2" filter="url(#innerBevelShadow)">
                        
                        <!-- Sharp 'N' Left Pillar, Diagonal, & Foot Serifs -->
                        <path d="M 105 380 
                                 L 105 355 
                                 L 132 355 
                                 L 132 135 
                                 L 105 135 
                                 L 105 110 
                                 L 200 110 
                                 L 275 265 
                                 L 275 135 
                                 L 250 135 
                                 L 250 110 
                                 L 325 110 
                                 L 325 135 
                                 L 302 135 
                                 L 302 355 
                                 L 325 355 
                                 L 325 380 
                                 L 230 380 
                                 L 155 230 
                                 L 155 355 
                                 L 178 355 
                                 L 178 380 
                                 Z" />

                        <!-- Interlocking 'S' Loop, Top Crest, Bottom Sweeping Tail -->
                        <path d="M 255 130 
                                 C 255 105, 315 105, 340 140 
                                 C 358 165, 345 198, 295 220 
                                 C 240 242, 215 255, 215 290 
                                 C 215 325, 250 348, 295 338 
                                 C 338 328, 360 285, 360 285 
                                 L 382 300 
                                 C 382 300, 355 365, 290 378 
                                 C 225 388, 172 348, 172 290 
                                 C 172 230, 228 208, 278 185 
                                 C 322 162, 318 145, 295 142 
                                 C 268 140, 258 155, 258 155 
                                 Z" />
                    </g>
                </svg>
            </div>

            <!-- Top Divider -->
            <div class="gold-line"></div>

            <!-- Brand Title -->
            <h1 class="brand-text">NAPO STUDIOS</h1>

            <!-- Bottom Divider -->
            <div class="gold-line"></div>

        </div>
    </main>

    <!-- Landscape Rotate Alert overlay for mobile portrait orientation -->
    <div class="rotate-prompt">
        <div class="rotate-icon"></div>
        <p style="color: #d4af37; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;">
            Please rotate your device to landscape
        </p>
    </div>

    <script>
        async function forceLandscapeOrientation() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                console.log('Orientation lock requires user interaction.');
            }
        }

        document.addEventListener('click', forceLandscapeOrientation);
        document.addEventListener('touchstart', forceLandscapeOrientation);
    </script>

</body>
</html>
