<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Pure CSS Master Blueprint</title>
    
    <!-- Premium Vector Game Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Russo+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CORE CORE RESET & SCENE CONFIGURATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --wood-darkest: #160b04;
            --wood-shadow: #331c0d;
            --wood-base: #703f19;
            --wood-mid: #8a5629;
            --wood-light: #ab7543;
            --wood-highlight: #d49f65;
            
            --text-main: #ffffff;
            --text-stroke: #160a04;
            --text-gold: #fbc63b;
            --text-gold-shadow: #b37b12;
            
            --btn-blue-fill: #1a62b3;
            --btn-blue-dark: #0d3d75;
            --btn-green-fill: #459616;
            --btn-green-dark: #215108;
            
            --plaque-bg-main: #ddaf70;
            --plaque-bg-dark: #b58749;
            --plaque-border: #452910;
            
            --progress-container: #180f08;
            --progress-stroke: #402613;
            --progress-fill-top: #85e418;
            --progress-fill-mid: #52a60b;
            --progress-fill-bot: #256100;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #080706;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ==========================================================================
           2. RESPONSIBILITY PROTECTION STAGE (NO SIDEWAYS SCROLL)
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6vh 20px 4vh 20px;
            position: relative;
            overflow-x: hidden;
            z-index: 1;
        }

        /* ==========================================================================
           3. ADVANCED PURE CSS ARTWORK SCENE ENGINE (OFFICE BACKGROUND)
           ========================================================================== */
        .office-bg-engine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Room Split Perspective */
                linear-gradient(to bottom, transparent 62%, #26211a 62%, #1b1712 63.5%, transparent 63.5%),
                linear-gradient(to bottom, #706757 0%, #564f41 62%, #3c4446 62%, #232a2c 100%);
            z-index: -20;
            pointer-events: none;
        }

        /* The Investigation Board with String Links */
        .art-corkboard {
            position: absolute;
            left: -20px;
            top: 30%;
            width: 280px;
            height: 220px;
            background: #472f1c;
            border: 10px solid #23150b;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 5px 15px 25px rgba(0,0,0,0.5);
            transform: perspective(800px) rotateY(28deg);
            z-index: -15;
        }
        .art-corkboard::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            background: #966c4a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }
        /* Mathematical simulation of string lines connecting notes */
        .art-corkboard::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: 
                linear-gradient(45deg, transparent 46%, #782119 47%, #782119 49%, transparent 50%),
                linear-gradient(-35deg, transparent 30%, #8a251c 31%, #8a251c 33%, transparent 34%),
                radial-gradient(box at 30% 40%, #ebdca5 25px, transparent 26px),
                radial-gradient(box at 70% 30%, #e6caa0 30px, transparent 31px),
                radial-gradient(box at 50% 70%, #decb97 22px, transparent 23px);
            opacity: 0.55;
        }

        /* Office Window with Custom Venetian Blinds & Skyline Silhouette */
        .art-window {
            position: absolute;
            right: -30px;
            top: 25%;
            width: 260px;
            height: 310px;
            background: linear-gradient(to bottom, #8faab2, #56737c);
            border: 12px solid #362d24;
            box-shadow: -10px 15px 30px rgba(0,0,0,0.4);
            transform: perspective(800px) rotateY(-25deg);
            z-index: -15;
        }
        /* Skyline Building Blocks */
        .art-window::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 45%;
            background: 
                linear-gradient(90deg, #445961 40px, transparent 40px) 20px 0,
                linear-gradient(90deg, #3d5057 55px, transparent 55px) 80px 20px,
                linear-gradient(90deg, #495e66 35px, transparent 35px) 150px 10px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            opacity: 0.7;
        }
        /* Venetian Blind Slats Layer */
        .art-window-blinds {
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent 0px, transparent 9px, #1c1814 9px, #1c1814 14px);
            opacity: 0.75;
        }

        /* Central Heavy Executive Detective Desk Frame */
        .art-desk {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            width: 520px;
            height: 240px;
            background: linear-gradient(to bottom, #442613, #1c0e06);
            border-top: 16px solid #5e351b;
            border-radius: 4px;
            box-shadow: 0 35px 50px rgba(0,0,0,0.85);
            z-index: -10;
        }
        /* Classical wood panel detailing lines on front of desk */
        .art-desk::before {
            content: '';
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 4px solid #28150a;
            background: linear-gradient(90deg, transparent 48%, #28150a 48%, #28150a 52%, transparent 52%);
            opacity: 0.4;
        }

        /* Desk Clutter: Retro Rotary Telephone & Paper Stacks */
        .art-desk-clutter {
            position: absolute;
            top: 52%;
            left: 54%;
            width: 70px;
            height: 45px;
            background: #1a1917;
            border-radius: 8px 8px 4px 4px;
            z-index: -9;
            box-shadow: -10px 10px 15px rgba(0,0,0,0.5);
        }
        /* Telephone handset piece loop */
        .art-desk-clutter::before {
            content: '';
            position: absolute;
            top: -8px; left: -5px; width: 80px; height: 16px;
            background: #262522;
            border-radius: 6px;
        }
        /* Left side paper stack box */
        .art-paper-stack {
            position: absolute;
            top: 53%;
            left: 32%;
            width: 90px;
            height: 35px;
            background: #dedcd8;
            border: 2px solid #9c9993;
            box-shadow: -5px 8px 12px rgba(0,0,0,0.4);
            transform: rotate(-3deg);
            z-index: -9;
        }

        /* High-Back Office Chair Silhouette rising behind the desk */
        .art-detective-chair {
            position: absolute;
            top: 44%;
            left: 36%;
            width: 110px;
            height: 120px;
            background: #1e1d1c;
            border-radius: 24px 24px 8px 8px;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.05), -15px 15px 30px rgba(0,0,0,0.6);
            z-index: -12;
        }
        .art-detective-chair::before {
            content: '';
            position: absolute;
            bottom: -30px; left: 45px; width: 20px; height: 40px;
            background: #111;
        }

        /* Cardboard Archive Boxes Stacked on the floor */
        .art-floor-boxes {
            position: absolute;
            left: 25px;
            bottom: 12%;
            width: 120px;
            height: 100px;
            background: #8c6746;
            border: 6px solid #3b2512;
            box-shadow: inset -12px -12px 0 rgba(0,0,0,0.12), 10px 20px 30px rgba(0,0,0,0.7);
            z-index: -8;
        }
        .art-floor-boxes::before {
            content: '';
            position: absolute;
            top: -22px; left: -6px; width: 132px; height: 26px;
            background: #a87f59;
            border: 6px solid #3b2512;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Coat Rack Stand with Hat & Trench Coat Silhouette on the right side */
        .art-coat-rack {
            position: absolute;
            right: 30px;
            bottom: 15%;
            width: 14px;
            height: 340px;
            background: #26170c;
            box-shadow: 15px 10px 25px rgba(0,0,0,0.5);
            z-index: -9;
        }
        /* Coat hanging form outline overlay */
        .art-coat-rack::before {
            content: '';
            position: absolute;
            top: 40px; left: -35px; width: 84px; height: 210px;
            background: #a3814b;
            border-radius: 20px 20px 8px 8px;
            box-shadow: inset -15px 0 20px rgba(0,0,0,0.25), 10px 15px 25px rgba(0,0,0,0.4);
        }
        /* Fedora Hat on top block */
        .art-coat-rack::after {
            content: '';
            position: absolute;
            top: 5px; left: -25px; width: 64px; height: 36px;
            background: #3d352b;
            border-radius: 12px 12px 2px 2px;
            box-shadow: 0 6px 0 #1c1814;
        }

        /* Scattered Case File Folders Left on Floor */
        .art-floor-papers {
            position: absolute;
            right: 80px;
            bottom: 16%;
            width: 85px;
            height: 60px;
            background: #cfb37c;
            transform: rotate(25deg) skewX(10deg);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.5);
            z-index: -7;
        }

        /* Strategic Atmospheric Focus Blur Gradient Overlay matching image focal depth */
        .atmospheric-blur-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(0,0,0,0.5) 95%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            pointer-events: none;
            z-index: -5;
        }

        /* ==========================================================================
           4. MAIN CONTENT CONTAINER UNIT
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        /* ==========================================================================
           5. "GUMSHOE EMPIRE" TIMBER SIGNBOARD COMPONENT
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 45%, var(--wood-base) 90%, var(--wood-shadow) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 22px;
            padding: 38px 18px 58px 18px;
            box-shadow: 
                0 16px 0 var(--wood-darkest),
                0 28px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: polygon(2.5% 0%, 97.5% 0%, 100% 100%, 0% 100%);
        }

        .wood-grain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px, transparent 2px, transparent 5px);
            pointer-events: none;
            z-index: 1;
        }

        .wood-plank-joint {
            position: absolute;
            left: 0; width: 100%; height: 7px;
            background: var(--text-stroke);
            z-index: 2;
        }
        .joint-alpha { top: 35%; }
        .joint-beta { top: 67%; }

        /* Strategic Clean Vector Bullet Impacts matching original positions */
        .bullet-hole-vector {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #0b0603;
            border-radius: 50%;
            box-shadow: 
                inset 2px 2px 4px rgba(0,0,0,0.95),
                0 0 0 5px var(--wood-highlight),
                0 0 0 7px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 30%; left: 8%; }
        .bh-v2 { top: 31%; left: 36%; width: 16px; height: 16px; }
        .bh-v3 { top: 29%; left: 56%; }
        .bh-v4 { top: 32%; left: 71%; width: 17px; height: 17px; }
        .bh-v5 { top: 64%; left: 18%; }
        .bh-v6 { top: 62%; left: 44%; }

        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(48px, 12.8vw, 74px);
            line-height: 0.78;
            color: var(--text-main);
            position: relative;
            letter-spacing: -2px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 12px 0 var(--wood-darkest),
                 0px 20px 15px rgba(0,0,0,0.7);
        }

        .title-row.gumshoe {
            transform: scaleX(0.96);
        }

        /* Magnifying Glass Element Vector nested inside the Letter O */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(48px, 12.8vw, 74px);
        }
        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: 2px; left: 4px; width: 78%; height: 78%;
            border: 8px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }
        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -6px; right: 2px; width: 9px; height: 24px;
            background: var(--text-stroke);
            border-radius: 3px;
            transform: rotate(-45deg);
            z-index: 3;
        }

        /* Bottom Row "EMPIRE" Block */
        .title-row.empire {
            font-size: clamp(56px, 14.8vw, 86px);
            color: var(--text-gold);
            margin-top: 12px;
            letter-spacing: -1px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-gold-shadow),
                 0px 10px 0 var(--text-stroke),
                 0px 16px 0 var(--wood-darkest),
                 0px 24px 20px rgba(0,0,0,0.85);
        }

        /* ==========================================================================
           6. FLANKING ACTION RIBBONS & BADGE HEADER
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -36px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 12px 20px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(14px, 3.8vw, 19px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 8px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 14px;
            border-bottom-left-radius: 14px;
            border-right: none;
            transform: rotate(-4deg) translateX(6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 14px;
            border-bottom-right-radius: 14px;
            border-left: none;
            transform: rotate(3deg) translateX(-6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .center-star-badge {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #fff099 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.3) rotate(-4deg);
            filter: drop-shadow(0px 6px 0px var(--text-stroke));
        }

        /* ==========================================================================
           7. BRASS PLAQUE INFOCARD NODE
           ========================================================================== */
        .description-plaque-shell {
            width: 92%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 14px 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 20px 25px rgba(0,0,0,0.75);
            position: relative;
            z-index: 4;
        }

        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }
        .description-plaque-shell::before { left: 14px; }
        .description-plaque-shell::after { right: 14px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(14px, 3.6vw, 18px);
            color: #261609;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           8. TRACKER BAR COMPONENT (STRICT CONTAINMENT)
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 8vh;
            margin-bottom: 20px;
            z-index: 10;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 6px rgba(0,0,0,0.9);
        }

        .progress-bar-shell {
            width: 100%;
            height: 30px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 30px;
            padding: 3px;
            box-shadow: 
                inset 0 4px 10px rgba(0,0,0,0.95),
                0 3px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-bar-fluid {
            width: 60%; /* Hard-anchored baseline state matching standard reference image frame */
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 6px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 3.6vw, 17px);
            color: #fce3c3;
            line-height: 1.45;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.95),
                 1px -1px 0 rgba(0,0,0,0.95),
                -1px  1px 0 rgba(0,0,0,0.95),
                 1px  1px 0 rgba(0,0,0,0.95),
                 0px 3px 5px rgba(0,0,0,0.95);
        }

        /* ==========================================================================
           9. HIGH-DENSITY DEVICE ADAPTABILITY CONSTRAINTS
           ========================================================================== */
        @media screen and (max-height: 740px) {
            .game-viewport { padding-top: 3vh; }
            .loading-status-group { margin-top: 4vh; }
            .wood-logo-billboard { padding-bottom: 44px; }
        }
    </style>
</head>
<body>

    <!-- CSS Render Engine Node Assets -->
    <div class="office-bg-engine"></div>
    <div class="art-corkboard"></div>
    <div class="art-window">
        <div class="art-window-blinds"></div>
    </div>
    <div class="art-detective-chair"></div>
    <div class="art-desk"></div>
    <div class="art-desk-clutter"></div>
    <div class="art-paper-stack"></div>
    <div class="art-floor-boxes"></div>
    <div class="art-coat-rack"></div>
    <div class="art-floor-papers"></div>
    <div class="atmospheric-blur-layer"></div>

    <!-- Active Device Containment Interface Viewport -->
    <main class="game-viewport" id="gameViewport">
        
        <!-- Central Signboard Container -->
        <div class="gui-main-container">
            
            <!-- Structural Wooden Billboard Shield -->
            <div class="wood-logo-billboard">
                <div class="wood-grain-overlay"></div>
                <div class="wood-plank-joint joint-alpha"></div>
                <div class="wood-plank-joint joint-beta"></div>

                <!-- Vector Impact Marks -->
                <div class="bullet-hole-vector bh-v1"></div>
                <div class="bullet-hole-vector bh-v2"></div>
                <div class="bullet-hole-vector bh-v3"></div>
                <div class="bullet-hole-vector bh-v4"></div>
                <div class="bullet-hole-vector bh-v5"></div>
                <div class="bullet-hole-vector bh-v6"></div>

                <!-- Text Layer Core -->
                <div class="title-text-wrap">
                    <h1 class="title-row gumshoe">
                        GUMSH<span class="magnifier-embedded-node">O</span>E
                    </h1>
                    <h1 class="title-row empire">EMPIRE</h1>
                </div>
            </div>

            <!-- Interlocking Header Sub-Ribbon Matrix -->
            <div class="ribbon-badge-row">
                <div class="ribbon-wing left-blue">Start Small</div>
                <div class="center-star-badge"></div>
                <div class="ribbon-wing right-green">Crack Cases</div>
            </div>

            <!-- Metallic Plaque Block Node -->
            <div class="description-plaque-shell">
                <p>From Low-Grade P.I.<br>To The World's Best P.I.!</p>
            </div>
            
        </div>

        <!-- Lower Loading Status Group Component Layer -->
        <div class="loading-status-group">
            <h2 class="loading-title-text">Loading...</h2>
            
            <!-- Fluid Progress Containing Shell -->
            <div class="progress-bar-shell">
                <div class="progress-bar-fluid"></div>
            </div>
