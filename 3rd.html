<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Pure CSS Engine Replica</title>
    
    <!-- High-Fidelity Font Mappings matching Game UI Spec -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fredoka:wght@600;700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CORE RESET & ENGINE VARIABLE MATRIX
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Palette Sampling Directly From The Graphic Art Pieces */
            --wood-darkest: #190a02;
            --wood-shadow: #331b0c;
            --wood-base: #703f19;
            --wood-mid: #8e5529;
            --wood-light: #b07442;
            --wood-highlight: #d19a62;
            
            --text-main: #ffffff;
            --text-stroke: #160a03;
            --text-gold-light: #fff5cc;
            --text-gold: #f2c042;
            --text-gold-shadow: #b37a10;
            
            --btn-blue-fill: #1b66b7;
            --btn-blue-dark: #0f3f77;
            --btn-green-fill: #439912;
            --btn-green-dark: #225407;
            
            --plaque-bg-main: #dfb273;
            --plaque-bg-dark: #b88b4c;
            --plaque-border: #4a2d12;
            
            --progress-container: #1b110a;
            --progress-stroke: #422714;
            --progress-fill-top: #7ee216;
            --progress-fill-mid: #50a60c;
            --progress-fill-bot: #286601;
            
            --room-wall: #58544a;
            --room-floor: #3c484a;
            --shadow-deep: rgba(0, 0, 0, 0.85);
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0c0908;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           2. ANTI-SIDEWAYS RESPONSIVE SCENE ANCHOR STAGE
           ========================================================================== */
        .game-stage-viewport {
            width: 100%;
            min-height: 100vh;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5vh 20px 3vh 20px;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        /* ==========================================================================
           3. INTERIOR ART SCENE ENVIRONMENT (100% PURE CSS VECTOR ART)
           ========================================================================== */
        .office-bg-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* Base Wall Trim Molding */
                linear-gradient(to bottom, transparent 52%, #221c17 52%, #2d2620 52.5%, #16120e 53.5%, transparent 53.5%),
                /* Vertical Atmospheric Lighting Shadow */
                linear-gradient(to right, rgba(0,0,0,0.4) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 100%),
                /* Split Wall & Floor Matrix */
                linear-gradient(to bottom, var(--room-wall) 0%, #464239 52%, var(--room-floor) 52%, #2b3335 100%);
            z-index: -20;
            filter: blur(7px); /* True Photographic Atmospheric Depth Layer */
            transform: scale(1.05);
        }

        /* Left Clue Corkboard */
        .corkboard-canvas {
            position: absolute;
            left: -10px; top: 28%;
            width: 240px; height: 250px;
            background: #3c2313;
            border: 12px solid #1c1008;
            border-radius: 4px;
            box-shadow: 5px 15px 30px rgba(0,0,0,0.7);
            transform: perspective(1000px) rotateY(30deg);
            z-index: -18;
        }
        .corkboard-canvas::before {
            content: ''; position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: #9d7350;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }
        /* Intricate String Matrix & Pinned Notes */
        .corkboard-canvas::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: 
                linear-gradient(28deg, transparent 44%, #a02222 45%, #a02222 47%, transparent 48%),
                linear-gradient(-35deg, transparent 48%, #801818 49%, #801818 51%, transparent 52%),
                radial-gradient(circle at 25% 30%, #ebd6ab 24px, transparent 25px),
                radial-gradient(circle at 70% 40%, #dec08a 28px, transparent 29px),
                radial-gradient(circle at 50% 75%, #decfa2 22px, transparent 23px);
            opacity: 0.8;
        }

        /* Window & Venetian Blinds Over Cityscape Skyline */
        .window-frame-node {
            position: absolute;
            right: -15px; top: 22%;
            width: 220px; height: 320px;
            background: linear-gradient(to bottom, #dbeff5, #7da5b2);
            border: 14px solid #231b14;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), -10px 15px 30px rgba(0,0,0,0.6);
            transform: perspective(1000px) rotateY(-25deg);
            z-index: -17;
        }
        /* City Skyline Silhouettes & Blind Blades Layer */
        .window-frame-node::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: 
                /* Skyline Skyscrapers Block Grid */
                linear-gradient(to right, transparent 15%, #42585c 15%, #42585c 45%, transparent 45%),
                linear-gradient(to right, transparent 55%, #2f3f42 55%, #2f3f42 85%, transparent 85%),
                /* Micro-lines for Blinds Structure */
                repeating-linear-gradient(transparent 0px, transparent 10px, #16120e 10px, #16120e 16px);
            opacity: 0.9;
        }

        /* Executive Mahogany Desk Platform */
        .desk-base-monolith {
            position: absolute;
            bottom: 12%; left: 50%;
            transform: translateX(-50%);
            width: 540px; height: 240px;
            background: linear-gradient(to bottom, #4f2e1a, #231207);
            border-top: 14px solid #663d24;
            border-radius: 6px;
            box-shadow: 0 5px 0 #130a04, 0 30px 50px rgba(0,0,0,0.95);
            z-index: -10;
        }
        /* Framed Panels Inside Executive Desk */
        .desk-base-monolith::before {
            content: ''; position: absolute; top: 30px; left: 35px; width: 130px; height: 160px;
            background: #3a2011; border: 4px solid #160d07; box-shadow: inset 0 0 25px rgba(0,0,0,0.7);
        }
        .desk-base-monolith::after {
            content: ''; position: absolute; top: 30px; right: 35px; width: 130px; height: 160px;
            background: #3a2011; border: 4px solid #160d07; box-shadow: inset 0 0 25px rgba(0,0,0,0.7);
        }

        /* High Back Detective Office Chair */
        .detective-chair-node {
            position: absolute;
            bottom: 28%; left: 50%;
            transform: translateX(-50%);
            width: 150px; height: 160px;
            background: linear-gradient(to bottom, #1f2124, #111214);
            border: 6px solid #0a0b0c;
            border-radius: 24px 24px 12px 12px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.8);
            z-index: -12;
        }
        /* Tufted Chair Cushion Details */
        .detective-chair-node::before {
            content: ''; position: absolute; top: 20px; left: 20px; width: 20px; height: 20px;
            background: #090a0b; border-radius: 50%;
            box-shadow: 58px 0 0 #090a0b, 0 45px 0 #090a0b, 58px 45px 0 #090a0b;
        }

        /* Desk Clutter Documents & Assets */
        .desk-clutter-manifest {
            position: absolute;
            bottom: 34%; left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 45px;
            z-index: -9;
        }
        /* Stacks of Folders on Left */
        .clutter-folders-left {
            position: absolute; left: 25px; bottom: -5px;
            width: 110px; height: 35px;
            background: #cbb28d; border: 4px solid #1c120a;
            border-radius: 2px; box-shadow: -5px 8px 15px rgba(0,0,0,0.6);
            transform: rotate(-2deg);
        }
        .clutter-folders-left::before {
            content: ''; position: absolute; top: -10px; left: 6px; width: 95px; height: 10px;
            background: #bd9f76; border: 4px solid #1c120a; transform: rotate(5deg);
        }
        /* Antique Rotary Phone Object */
        .clutter-phone-node {
            position: absolute; right: 180px; bottom: -8px;
            width: 60px; height: 45px;
            background: #191715; border: 4px solid #080706;
            border-radius: 6px; box-shadow: 0 10px 15px rgba(0,0,0,0.7);
        }

        /* Cardboard Storage Archival Boxes On Floor Left */
        .storage-box-stack {
            position: absolute; left: 20px; bottom: 8%;
            width: 130px; height: 110px;
            background: #866140; border: 6px solid #331d0b;
            box-shadow: inset -15px -15px 0 rgba(0,0,0,0.15), 8px 20px 35px rgba(0,0,0,0.9);
            z-index: -7;
        }
        .storage-box-stack::before {
            content: ''; position: absolute; top: -20px; left: -6px; width: 142px; height: 26px;
            background: #9c7552; border: 6px solid #331d0b; box-shadow: 0 5px 6px rgba(0,0,0,0.4);
        }
        /* Overlapping Box asset tilt */
        .storage-box-tilt {
            position: absolute; left: 75px; bottom: 3%;
            width: 115px; height: 95px;
            background: #735132; border: 6px solid #291506;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.9);
            transform: rotate(-7deg);
            z-index: -6;
        }

        /* Trench Coat Hanger Stand Assembly on Right */
        .rack-stand-node {
            position: absolute; right: 20px; bottom: 6%;
            width: 80px; height: 310px;
            z-index: -7;
        }
        .rack-main-pole {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 12px; height: 310px; background: #231309;
        }
        .rack-coat-shape {
            position: absolute; top: 50px; left: -8px;
            width: 96px; height: 190px;
            background: #967547; border: 5px solid #25190d;
            border-radius: 20px 20px 10px 10px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.4), -10px 20px 25px rgba(0,0,0,0.6);
        }
        .rack-fedora-hat {
            position: absolute; top: 15px; left: 2px;
            width: 80px; height: 38px;
            background: #4a3e36; border: 4px solid #16120e;
            border-radius: 22px 22px 5px 5px; transform: rotate(7deg);
            box-shadow: 0 8px 12px rgba(0,0,0,0.5);
        }

        /* Scattered Files on Floor Right */
        .floor-litter-documents {
            position: absolute; right: 90px; bottom: 12%;
            width: 90px; height: 55px;
            background: #decfa8; border: 2px solid #231b12;
            transform: perspective(400px) rotateX(45deg) rotateZ(30deg);
            box-shadow: 4px 8px 12px rgba(0,0,0,0.5);
            z-index: -5;
        }

        /* Lens Vignette Ambient Overlay Node */
        .ambient-lens-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(0,0,0,0.55) 90%);
            z-index: -4;
            pointer-events: none;
        }

        /* ==========================================================================
           4. CENTRAL GRAPHICAL DATA PLACEMENT WRAPPER
           ========================================================================== */
        .gui-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* ==========================================================================
           5. "GUMSHOE EMPIRE" 3D TIMBER SIGNBOARD ASSEMBLY
           ========================================================================== */
        .wood-billboard-node {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 45%, var(--wood-base) 85%, var(--wood-shadow) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 24px;
            padding: 40px 16px 60px 16px;
            box-shadow: 
                0 16px 0 var(--wood-darkest),
                0 25px 40px var(--shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Accurate Cartoon Curved Frame Mapping Silhouette */
            clip-path: polygon(3% 0%, 97% 0%, 100% 100%, 0% 100%);
        }

        .wood-striation-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        .wood-plank-groove {
            position: absolute;
            left: 0; width: 100%; height: 8px;
            background: var(--text-stroke);
            opacity: 0.95;
            z-index: 2;
        }
        .groove-1 { top: 36%; }
        .groove-2 { top: 68%; }

        /* Exact Splinter Vector Bullet Impacts Placement Mapping */
        .bullet-fracture-node {
            position: absolute;
            width: 18px; height: 18px;
            background: #0a0503;
            border-radius: 50%;
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.98),
                0 0 0 4px var(--wood-highlight),
                0 0 0 6.5px var(--text-stroke);
            z-index: 10;
        }
        .bf-1 { top: 31%; left: 8%; }
        .bf-2 { top: 33%; left: 36%; width: 16px; height: 16px; }
        .bf-3 { top: 28%; left: 57%; }
        .bf-4 { top: 34%; left: 71%; width: 17px; height: 17px; }
        .bf-5 { top: 66%; left: 18%; }
        .bf-6 { top: 64%; left: 44%; }

        /* Typography Vector Configuration Engine */
        .typography-title-stack {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row-line {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(46px, 12.5vw, 70px);
            line-height: 0.76;
            color: var(--text-main);
            position: relative;
            letter-spacing: -2.5px;
            /* Multi-layer Heavy Outline & Shading Stack */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 12px 0 var(--wood-darkest),
                 0px 20px 18px rgba(0,0,0,0.75);
        }

        .title-row-line.gumshoe {
            transform: scaleX(0.96);
        }

        /* Magnifying Glass Vector Architecture Seamlessly Injected Inside 'O' */
        .lens-embedded-o-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(46px, 12.5vw, 70px);
        }
        .lens-embedded-o-node::before {
            content: ''; position: absolute;
            top: 2px; left: 4px; width: 78%; height: 78%;
            border: 8.5px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%; z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }
        .lens-embedded-o-node::after {
            content: ''; position: absolute;
            bottom: -6px; right: 2px; width: 10px; height: 22px;
            background: var(--text-stroke); border-radius: 4px;
            transform: rotate(-45deg); z-index: 3;
        }
        /* Detective Silhouette Inside Magnifier Glass */
        .detective-inner-silhouette {
            position: absolute;
            top: 15px; left: 16px; width: 20px; height: 24px;
            background: #231a14; border-radius: 40% 40% 50% 50%;
            z-index: 5; transform: rotate(12deg);
        }
        .detective-inner-silhouette::before {
            content: ''; position: absolute;
            top: -5px; left: 2px; width: 16px; height: 9px;
            background: #231a14; border-radius: 50%;
        }

        /* Gold Coloration Component Layer "EMPIRE" */
        .title-row-line.empire {
            font-size: clamp(54px, 14.5vw, 82px);
            color: var(--text-gold);
            margin-top: 10px;
            letter-spacing: -1.5px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-gold-shadow),
                 0px 10px 0 var(--text-stroke),
                 0px 17px 0 var(--wood-darkest),
                 0px 26px 24px rgba(0,0,0,0.85);
        }

        /* ==========================================================================
           6. INTERLOCKING FLANKED ACTION RIBBONS & BADGE STAR CORE
           ========================================================================== */
        .action-ribbon-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -38px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing-banner {
            padding: 12px 22px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(13px, 3.6vw, 18px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5.5px solid var(--text-stroke);
            box-shadow: 0 7.5px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing-banner.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 14px; border-bottom-left-radius: 14px;
            border-right: none;
            transform: rotate(-3.5deg) translateX(6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing-banner.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 14px; border-bottom-right-radius: 14px;
            border-left: none;
            transform: rotate(2.5deg) translateX(-6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .center-gold-star {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #ffe990 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.3) rotate(-4deg);
            filter: drop-shadow(0px 6px 0px var(--text-stroke));
        }

        /* ==========================================================================
           7. SUBTITLE HANGING METALLIC BRASS PLAQUE
           ========================================================================== */
        .hanging-brass-plaque {
            width: 92%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5.5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 14px 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 22px 30px var(--shadow-deep);
            position: relative;
            z-index: 4;
        }

        /* Mechanical Rivets on Plaque Edges */
        .hanging-brass-plaque::before, .hanging-brass-plaque::after {
            content: ''; position: absolute; top: 50%;
            width: 9px; height: 9px;
            background: var(--plaque-border); border-radius: 50%;
            transform: translateY(-50%); box-shadow: inset 1px 1px 2px rgba(0,0,0,0.7);
        }
        .hanging-brass-plaque::before { left: 14px; }
        .hanging-brass-plaque::after { right: 14px; }

        .hanging-brass-plaque p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(13px, 3.5vw, 17.5px);
            color: #241407;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           8. LOWER PROGRESS TRACKER LOAD AREA (STRICT ZERO-HORIZONTAL SCROLL FLUIDITY)
           ========================================================================== */
        .loading-metrics-group {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 8vh;
            margin-bottom: 15px;
            z-index: 5;
        }

        .loading-title-label {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 6px rgba(0,0,0,0.95);
        }

        .meter-track-shell {
            width: 100%;
            height: 30px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 35px;
            padding: 3px;
            box-shadow: 
                inset 0 4px 12px rgba(0,0,0,0.95),
                0 3px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .meter-fluid-progress {
            width: 55%; /* Synced Exactly to Match the Static Percentage Frame on the Target Blueprint */
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        .gameplay-hint-container {
            width: 95%;
            text-align: center;
            padding: 0 6px;
        }

        .gameplay-hint-container p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(13.5px, 3.6vw, 16.5px);
            color: #f7dfbe;
            line-height: 1.45;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.95),
                 1px -1px 0 rgba(0,0,0,0.95),
                -1px  1px 0 rgba(0,0,0,0.95),
                 1px  1px 0 rgba(0,0,0,0.95),
                 0px 3px 5px rgba(0,0,0,0.95);
        }

        /* ==========================================================================
           9. DEVICE HEIGHT ADAPTIVE DYNAMIC ADJUSTERS
           ========================================================================== */
        @media screen and (max-height: 760px) {
            .game-stage-viewport { padding-top: 3vh; }
            .loading-metrics-group { margin-top: 4vh; }
            .wood-billboard-node { padding-bottom: 45px; }
            .action-ribbon-row { margin-top: -32px; }
        }
    </style>
</head>
<body>

    <!-- Pure CSS Interior Scene Nodes Architecture Matrix -->
    <div class="office-bg-wrapper"></div>
    <div class="corkboard-canvas"></div>
    <div class="window-frame-node"></div>
    <div class="detective-chair-node"></div>
    
    <!-- Desk Monolith & Desk Clutter Assembly Layers -->
    <div class="desk-base-monolith"></div>
    <div class="desk-clutter-manifest">
        <div class="clutter-folders-left"></div>
