<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Identical UI Engine</title>
    
    <!-- Premium Comic & Game Font Sync Architecture -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fredoka:wght@700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CORE RENDER ENGINE CONFIGURATION & RESET
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Hyper-Targeted Color Palette Sampled From Image Assets */
            --wood-darkest: #170902;
            --wood-shadow: #2c160a;
            --wood-base: #6b3b19;
            --wood-mid: #885128;
            --wood-light: #ab6f3e;
            --wood-highlight: #d19760;
            
            --text-stroke: #120904;
            --text-gold: #fbc636;
            --text-gold-shadow: #b37b0d;
            
            --ribbon-blue-top: #2575dc;
            --ribbon-blue-bot: #0f4b9b;
            --ribbon-green-top: #4ba615;
            --ribbon-green-bot: #215e06;
            
            --plaque-bg-top: #eac58a;
            --plaque-bg-bot: #bd9051;
            --plaque-border: #44260d;
            
            --progress-bg: #140d07;
            --progress-stroke: #442a15;
            --progress-fill: linear-gradient(180deg, #8cee19 0%, #5ba70d 45%, #2a6102 100%);
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0c0a08;
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           2. RESPONSIVE VIEWPORT STAGE & DETECTIVE OFFICE BACKGROUND ENGINE
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 45px 20px 30px 20px;
            position: relative;
            background: #28241e;
            z-index: 1;
            overflow: hidden;
        }

        /* Pure CSS Mathematical Vector Matrix Replication of the Detective Office Scene */
        .game-viewport::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Window Blinds Horizontal Shadows */
                repeating-linear-gradient(180deg, transparent 0px, transparent 12px, rgba(0,0,0,0.15) 12px, rgba(0,0,0,0.15) 24deg),
                /* Office Window Silhouette Frame Right Side */
                linear-gradient(90deg, transparent 60%, rgba(20,18,15,0.4) 60%, rgba(20,18,15,0.4) 92%, transparent 92%),
                /* Bulletin Case Board Silhouette Frame Left Side */
                linear-gradient(180deg, transparent 18%, #3a2a1b 18%, #3a2a1b 52%, transparent 52%),
                /* Vertical Perspective Wall Intersects */
                linear-gradient(90deg, transparent 30%, rgba(0,0,0,0.2) 30%, rgba(0,0,0,0.2) 32%, transparent 32%),
                /* Desk Base Block Solid Shadows */
                linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.4) 75%, transparent 75%),
                /* Horizontal Wall Trim Dividing Rail Line */
                linear-gradient(180deg, transparent 68%, #19140f 68%, #19140f 70%, transparent 70%),
                /* Master Atmospheric Depth Gradient - Wall to Carpet Floor Separation */
                linear-gradient(180deg, #585246 0%, #443f35 68%, #323c40 68%, #1c2225 100%);
            background-size: 100% 100%;
            z-index: -3;
        }

        /* Thick Layered Atmospheric Gaussian Blur Node mimicking low camera depth-of-field */
        .game-viewport::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(0,0,0,0.55) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -2;
            pointer-events: none;
        }

        /* ==========================================================================
           3. CENTRAL GUI PLACEMENT WRAPPER (SHIELD AGAINST SIDEWAYS SCROLL)
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 460px;
            margin: auto 0;
            position: relative;
            z-index: 5;
        }

        /* ==========================================================================
           4. "GUMSHOE EMPIRE" SIGNBOARD CRADLE - CARTOON RENDER ARCHETYPE
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(180deg, var(--wood-mid) 0%, var(--wood-base) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 28px;
            padding: 24px 16px 52px 16px;
            box-shadow: 
                0 16px 0 var(--wood-darkest),
                0 22px 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Precise curved outer structural frame silhouette mapping */
            clip-path: polygon(4% 0%, 96% 0%, 100% 100%, 0% 100%);
        }

        /* Wood Fiber Board Planks Isolators */
        .wood-plank-joint {
            position: absolute;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--text-stroke);
            z-index: 2;
        }
        .joint-1 { top: 35%; }
        .joint-2 { top: 68%; }

        /* Highly Detailed Procedural Vector Bullet Mark Fractures */
        .bullet-hole-vector {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #0b0704;
            border-radius: 50%;
            box-shadow: 
                inset 3px 3px 5px rgba(0,0,0,0.95),
                0 0 0 4px var(--wood-highlight),
                0 0 0 7px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 31%; left: 6%; width: 20px; height: 20px; }
        .bh-v2 { top: 32%; left: 34%; }
        .bh-v3 { top: 29%; left: 55%; width: 19px; height: 19px; }
        .bh-v4 { top: 34%; left: 70%; }
        .bh-v5 { top: 65%; left: 16%; }
        .bh-v6 { top: 64%; left: 42%; width: 21px; height: 21px; }

        /* Typography Graphics Wrapper */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(44px, 12.5vw, 68px);
            line-height: 0.85;
            color: #ffffff;
            position: relative;
            /* High-Fidelity Comic Book Multi-Tier Deep Extrusion Shadow Stacking */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-stroke),
                 0px 10px 0 var(--wood-darkest),
                 0px 16px 15px rgba(0,0,0,0.6);
            letter-spacing: -2px;
        }

        /* Magnifying Glass Vector Assembly Embedded within the Letter O */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(44px, 12.5vw, 68px);
        }

        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 4px;
            width: 82%;
            height: 82%;
            border: 8px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }

        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -7px;
            right: 0px;
            width: 11px;
            height: 24px;
            background: var(--text-stroke);
            border-radius: 4px;
            transform: rotate(-45deg);
            z-index: 3;
        }

        .title-row.empire {
            font-size: clamp(52px, 14.5vw, 82px);
            color: var(--text-gold);
            margin-top: 4px;
            letter-spacing: -1px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-gold-shadow),
                 0px  9px 0 var(--text-stroke),
                 0px 14px 0 var(--wood-darkest),
                 0px 20px 20px rgba(0,0,0,0.7);
        }

        /* ==========================================================================
           5. INTERLOCKING OBJECTIVE WING RIBBONS & GOLD ACCENT STAR
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -36px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 10px 16px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(13px, 3.8vw, 19px);
            text-transform: uppercase;
            color: #ffffff;
            border: 5px solid var(--text-stroke);
            box-shadow: 0 7px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--ribbon-blue-top) 0%, var(--ribbon-blue-bot) 100%);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
            transform: rotate(-4deg) translateX(8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--ribbon-green-top) 0%, var(--ribbon-green-bot) 100%);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-left: none;
            transform: rotate(3deg) translateX(-8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        /* Procedural Pure CSS Multi-Point Star Clip Mapping */
        .center-star-badge {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #fff078 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.3) rotate(-4deg);
            filter: drop-shadow(0px 5px 0px var(--text-stroke));
        }

        /* ==========================================================================
           6. DESCRIPTION CONTEXT PLAQUE STRIP
           ========================================================================== */
        .description-plaque-shell {
            width: 88%;
            background: linear-gradient(180deg, var(--plaque-bg-top) 0%, var(--plaque-bg-bot) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 12px 18px;
            margin-top: 16px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 16px 25px rgba(0,0,0,0.65);
            position: relative;
            z-index: 4;
        }

        /* Rivet Screws on Edges */
        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 7px;
            height: 7px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .description-plaque-shell::before { left: 12px; }
        .description-plaque-shell::after { right: 12px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(13px, 3.5vw, 18px);
            color: #241305;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: -0.3px;
        }

        /* ==========================================================================
           7. SYSTEM RUNTIME PROGRESS GAUGE (BOTTOM POSITIONED LAYER)
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            margin-bottom: 10px;
            z-index: 5;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 4px rgba(0,0,0,0.9);
            animation: textPulseFrames 2s infinite ease-in-out;
        }

        /* Progress Bar Shell */
        .progress-bar-shell {
            width: 100%;
            height: 30px;
            background: var(--progress-bg);
            border: 5px solid var(--progress-stroke);
            border-radius: 40px;
            padding: 3px;
            box-shadow: 
                inset 0 6px 12px rgba(0,0,0,0.95),
                0 4px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Fluid Meter Fill matching snapshot alignment */
        .progress-bar-fluid {
            width: 60%; 
            height: 100%;
            background: var(--progress-fill);
            border-radius: 30px;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.5);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dynamic Micro System Gameplay Advice Box */
        .gameplay-tip-box {
            width: 100%;
            text-align: center;
            padding: 0 6px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 3.8vw, 17px);
            color: #fce5c8;
            line-height: 1.4;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.8),
                 1px -1px 0 rgba(0,0,0,0.8),
                -1px  1px 0 rgba(0,0,0,0.8),
                 1px  1px 0 rgba(0,0,0,0.8),
                 0px 4px 5px rgba(0,0,0,0.95);
        }

        /* ==========================================================================
           8. MASTER SYSTEM PRESENTATION ANIMATION LAYER
           ========================================================================== */
        @keyframes textPulseFrames {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.88; transform: scale(0.97); }
        }

        /* ==========================================================================
           9. RESPONSIVE COMPACT DISPLAY DECK TUNER
           ========================================================================== */
        @media screen and (max-height: 720px) {
            .game-viewport { padding: 24px 16px 20px 16px; }
            .loading-status-group { margin-top: 35px; }
            .wood-logo-billboard { padding: 18px 12px 42px 12px; }
            .ribbon-badge-row { margin-top: -30px; }
        }
    </style>
</head>
<body>

    <!-- Main Dynamic View Engine Base -->
    <main class="game-viewport" id="gameViewport">
        
        <!-- Central Layout Anchor Interface Container -->
        <div class="gui-main-container">
            
            <!-- Structural Signboard Unit Layout Frame -->
            <div class="wood-logo-billboard">
                <div class="wood-plank-joint joint-1"></div>
                <div class="wood-plank-joint joint-2"></div>

                <!-- Custom Vector Scattered Bullet Placements -->
                <div class="bullet-hole-vector bh-v1"></div>
                <div class="bullet-hole-vector bh-v2"></div>
                <div class="bullet-hole-vector bh-v3"></div>
                <div class="bullet-hole-vector bh-v4"></div>
                <div class="bullet-hole-vector bh-v5"></div>
                <div class="bullet-hole-vector bh-v6"></div>

                <!-- Text Branding Matrix Assemblies -->
                <div class="title-text-wrap">
                    <h1 class="title-row gumshoe">
                        GUMSH<span class="magnifier-embedded-node">O</span>E
                    </h1>
                    <h1 class="title-row empire">EMPIRE</h1>
                </div>
            </div>

            <!-- Interlocking Subtitle Badges and Star Assembly -->
            <div class="ribbon-badge-row">
                <div class="ribbon-wing left-blue">Start Small</div>
                <div class="center-star-badge"></div>
                <div class="ribbon-wing right-green">Crack Cases</div>
            </div>

            <!-- Context Dialogue Sub Plaque Strip Frame -->
            <div class="description-plaque-shell">
                <p>From Low-Grade P.I.<br>To The World's Best P.I.!</p>
            </div>
            
        </div>

        <!-- Lower Screen Status Monitoring Deck Group -->
        <div class="loading-status-group">
            <h2 class="loading-title-text">Loading...</h2>
            
            <!-- Inset Gauges Base Container -->
            <div class="progress-bar-shell">
                <div class="progress-bar-fluid" id="mainProgressBarMeter"></div>
            </div>

            <!-- Gameplay Micro Information Advice Text Box -->
            <div class="gameplay-tip-box">
                <p>Tip: Check every detail. The truth is always in the evidence.</p>
            </div>
        </div>

    </main>

    <script>
        // Automatic runtime execution testing logic loop
        document.addEventListener("DOMContentLoaded", () => {
            const meterElement = document.getElementById("mainProgressBarMeter");
            let progressTrack = 60; // Standard base starting point snapshot mapping
            
            setInterval(() => {
                if (progressTrack >= 100) {
                    progressTrack = 45; // Smooth presentation resets seamlessly
                } else {
                    progressTrack += Math.random() * 1.8;
                }
                meterElement.style.width = `${Math.min(progressTrack, 100)}%`;
            }, 320);
        });
    </script>
</body>
</html>
