<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Pure CSS High-Fidelity Engine</title>
    
    <!-- Premium Comic, Game, and Retro Typefaces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=Russo+One&family=Special+Elite&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE ENGINE RESET & PERFORMANCE VARIABLES
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Palette Extraction from the provided Game Asset */
            --wood-darkest: #1e0f06;
            --wood-shadow: #3b1f0e;
            --wood-base: #74431b;
            --wood-mid: #905728;
            --wood-light: #b67d47;
            --wood-highlight: #dba86f;
            
            --text-main: #ffffff;
            --text-stroke: #1b0f08;
            --text-gold-light: #fff3bf;
            --text-gold: #fbc737;
            --text-gold-shadow: #bf8613;
            
            --btn-blue-fill: #1964b7;
            --btn-blue-dark: #0e3f79;
            --btn-green-fill: #439a13;
            --btn-green-dark: #205406;
            
            --plaque-bg-main: #e0b475;
            --plaque-bg-dark: #b88b4d;
            --plaque-border: #4a2d12;
            
            --progress-container: #1b1109;
            --progress-stroke: #452915;
            --progress-fill-top: #82e717;
            --progress-fill-mid: #52a90c;
            --progress-fill-bot: #266400;
            
            --ambient-shadow-deep: rgba(0, 0, 0, 0.8);
            
            /* Office Scene Custom Colors */
            --wall-color: #615a4d;
            --wall-shadow-color: #4b4438;
            --floor-color: #363f41;
            --trim-color: #272118;
            --desk-base: #492a15;
            --desk-dark: #221207;
            --desk-light: #61391d;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0c0a09;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================================================
           2. RESPONSIVE VIEWPORT STAGE ARCHITECTURE (GUARANTEED NO HORIZONTAL SCROLL)
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        /* ==========================================================================
           3. MAX-FIDELITY PURE CSS BACKDROP ARTWORK ENGINE (PURE VECTOR SHAPES)
           ========================================================================== */
        .office-vector-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            pointer-events: none;
            overflow: hidden;
        }

        /* Wall structure and floor geometry division */
        .scene-background-walls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Wall Trim Molding Grid Lines */
                linear-gradient(180deg, transparent 40%, var(--trim-color) 40%, var(--trim-color) 42%, transparent 42%),
                /* Overall Wall to Floor Split Gradient mapping */
                linear-gradient(180deg, var(--wall-color) 0%, var(--wall-shadow-color) 40%, var(--floor-color) 40%, #1c2224 100%);
        }

        /* Pure CSS Window Frame & Atmospheric City Silhouette Skyline */
        .scene-window-structure {
            position: absolute;
            right: 8%;
            top: 15%;
            width: clamp(200px, 30vw, 360px);
            height: clamp(280px, 45vh, 480px);
            background: #251b12; /* Frame core */
            padding: 12px;
            box-shadow: -15px 20px 40px rgba(0,0,0,0.5);
            border-bottom: 8px solid #16100a;
        }
        .window-glass-pane {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            /* City Highrises in fog simulation layout */
            background: 
                linear-gradient(90deg, transparent 10%, #4c5658 10%, #4c5658 35%, transparent 35%),
                linear-gradient(90deg, transparent 45%, #424b4d 45%, #424b4d 75%, transparent 75%),
                linear-gradient(90deg, transparent 65%, #535f61 65%, #535f61 95%, transparent 95%),
                linear-gradient(to bottom, #7f9599 0%, #58696c 100%);
            background-size: 100% 100%, 100% 70%, 100% 80%, 100% 100%;
            background-position: bottom;
            background-repeat: no-repeat;
        }
        /* Venetian Blinds Matrix Overlay Lines */
        .window-glass-pane::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent 0px, transparent 12px, rgba(23, 17, 11, 0.65) 12px, rgba(23, 17, 11, 0.65) 16px);
            z-index: 2;
        }

        /* Pure CSS Crime Cork Board, Pins, Sticky Notes & Interlinked Red Thread Yarn */
        .scene-corkboard-structure {
            position: absolute;
            left: 2%;
            top: 25%;
            width: clamp(180px, 28vw, 340px);
            height: clamp(140px, 25vh, 260px);
            background: #784e2b;
            border: 8px solid #3d230f;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6), 10px 15px 30px rgba(0,0,0,0.4);
            transform: perspective(600px) rotateY(12deg);
            padding: 8px;
        }
        .corkboard-pin-elements {
            width: 100%;
            height: 100%;
            position: relative;
            /* Multi-node layout array mimicking files and interconnected yarn grids */
            background: 
                linear-gradient(28deg, transparent 30%, #a01a1a 30%, #a01a1a 32%, transparent 32%),
                linear-gradient(-35deg, transparent 45%, #a01a1a 45%, #a01a1a 47%, transparent 47%),
                linear-gradient(75deg, transparent 15%, #a01a1a 15%, #a01a1a 17%, transparent 17%),
                /* Layered Notes representations */
                radial-gradient(ellipse at 20% 25%, #ebdca3 25px, transparent 26px),
                radial-gradient(ellipse at 75% 40%, #edd4b1 30px, transparent 31px),
                radial-gradient(ellipse at 45% 70%, #ebdca3 20px, transparent 21px),
                radial-gradient(ellipse at 80% 80%, #ffffff 18px, transparent 19px);
            background-size: 100% 100%;
            opacity: 0.75;
        }

        /* Heavy Wooden Executive Desk Workspace Layering Shapes */
        .scene-desk-structure {
            position: absolute;
            left: 50%;
            bottom: 12%;
            transform: translateX(-50%);
            width: clamp(480px, 75vw, 780px);
            height: clamp(180px, 26vh, 310px);
            background: linear-gradient(to bottom, var(--desk-base), var(--desk-dark));
            border-top: 14px solid var(--desk-light);
            border-radius: 4px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.85);
            z-index: 2;
        }
        /* Desk Props Counter Balance: Stacked Files & Retro Rotary Dial Desktop Phone Shape */
        .scene-desk-structure::before {
            content: '';
            position: absolute;
            top: -24px;
            left: 45px;
            width: clamp(70px, 12vw, 110px);
            height: 24px;
            background: #d5c091;
            border: 2px solid #1f140a;
            box-shadow: 0 -6px 0 #c2ae80, 0 -13px 0 #d5c091, 0 -19px 0 #bfae83, -5px 6px 12px rgba(0,0,0,0.45);
        }
        .scene-desk-structure::after {
            content: '';
            position: absolute;
            top: -30px;
            right: 22%;
            width: 65px;
            height: 30px;
            background: #161412;
            border-radius: 8px 8px 2px 2px;
            box-shadow: -4px 6px 12px rgba(0,0,0,0.55);
        }

        /* Master Tufted Office Desk Leather Chair Backrest Node */
        .scene-chair-structure {
            position: absolute;
            left: 32%;
            bottom: 28%;
            width: clamp(100px, 16vw, 150px);
            height: clamp(120px, 20vh, 180px);
            background: linear-gradient(to bottom, #23211e, #0e0d0c);
            border: 4px solid #131210;
            border-radius: 24px 24px 8px 8px;
            box-shadow: inset 0 10px 0 rgba(255,255,255,0.04), 0 12px 25px rgba(0,0,0,0.65);
            z-index: 1;
        }
        /* Tufted lines simulation inside the backrest */
        .scene-chair-structure::before {
            content: '.. .. ..';
            color: #000;
            font-size: 24px;
            letter-spacing: 8px;
            position: absolute;
            top: 30%; left: 50%; transform: translateX(-50%);
            opacity: 0.4;
        }

        /* Stacked Cardboard Moving/Archive Storage Boxes on Left Floor Frame */
        .scene-boxes-structure {
            position: absolute;
            left: 4%;
            bottom: 6%;
            width: clamp(100px, 18vw, 150px);
            height: clamp(90px, 15vh, 140px);
            background: #825d3c;
            border: 4px solid #3f2712;
            box-shadow: inset -15px -15px 0 rgba(0,0,0,0.12), 8px 15px 25px rgba(0,0,0,0.5);
            z-index: 3;
        }
        .scene-boxes-structure::before {
            content: '';
            position: absolute;
            top: -18px; left: -4px; width: calc(100% + 8px); height: 22px;
            background: #966e49;
            border: 4px solid #3f2712;
            box-shadow: 0 5px 6px rgba(0,0,0,0.25);
        }

        /* Vintage Brass Coat Rack Stand & Silhouette Trench Coat / Detective Fedora Fedora Hat */
        .scene-coatrack-structure {
            position: absolute;
            right: 4%;
            bottom: 8%;
            width: 14px;
            height: clamp(340px, 60vh, 520px);
            background: #23170c;
            box-shadow: 10px 12px 25px rgba(0,0,0,0.45);
            z-index: 3;
        }
        /* Trench coat flow wrap */
        .scene-coatrack-structure::before {
            content: '';
            position: absolute;
            top: 70px; left: -30px;
            width: 74px; height: clamp(180px, 35vh, 260px);
            background: linear-gradient(to right, #8b6f46, #634d2c);
            border-radius: 30px 30px 15px 15px;
            box-shadow: 8px 12px 20px rgba(0,0,0,0.5);
        }
        /* Detective Fedora Silhouette hat crown block layer */
        .scene-coatrack-structure::after {
            content: '';
            position: absolute;
            top: 32px; left: -34px;
            width: 82px; height: 34px;
            background: #362f27;
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 5px 0 rgba(255,255,255,0.08), 0 8px 12px rgba(0,0,0,0.45);
        }

        /* Case Scattered Loose File Papers Littered Across Floor Surface Base */
        .floor-littered-evidence-node {
            position: absolute;
            bottom: 15%;
            right: 28%;
            width: 55px; height: 40px;
            background: #dcd1ba;
            transform: rotate(-25deg) skewX(10deg);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
            z-index: 1;
        }
        .floor-littered-evidence-node::before {
            content: '';
            position: absolute;
            top: -10px; left: 20px;
            width: 48px; height: 42px;
            background: #cbb993;
            transform: rotate(40deg);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
        }

        /* Layered Atmospheric High-Depth Cinematic Focus Blur Nodes Matrix Overlay */
        .cinematic-blur-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 25%, rgba(12, 10, 8, 0.45) 95%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: -4;
            pointer-events: none;
        }

        /* ==========================================================================
           4. CENTRAL SCALE ENGINE & INTERFACE CONTROLLER CONTAINER
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 460px;
            margin: auto 0;
            position: relative;
            z-index: 10;
        }

        /* ==========================================================================
           5. MULTI-PLANK WOODEN LOGO ACCENT COMPONENT ("GUMSHOE EMPIRE")
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 50%, var(--wood-base) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 28px;
            padding: 32px 20px 56px 20px;
            box-shadow: 
                0 15px 0 var(--wood-darkest),
                0 22px 35px var(--ambient-shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Curved outer vector clipping map mimicking the signature layout frame */
            clip-path: polygon(3% 0%, 97% 0%, 100% 100%, 0% 100%);
        }

        /* Simulated Grains Line Strips Overlay */
        .wood-grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 5px);
            pointer-events: none;
            z-index: 1;
        }

        /* Horizontal Cut Separation Joins */
        .wood-plank-joint {
            position: absolute;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--text-stroke);
            opacity: 0.9;
            pointer-events: none;
            z-index: 2;
        }
        .joint-alpha { top: 34%; }
        .joint-beta { top: 67%; }

        /* Strategic Clean Vector Bullet Hole Fracture Punches */
        .bullet-hole-vector {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #0d0805;
            border-radius: 50%;
            box-shadow: 
                inset 3px 3px 5px rgba(0,0,0,0.95),
                0 0 0 5px var(--wood-highlight),
                0 0 0 7px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 30%; left: 8%; width: 18px; height: 18px; }
        .bh-v2 { top: 32%; left: 36%; }
        .bh-v3 { top: 28%; left: 58%; width: 17px; height: 17px; }
        .bh-v4 { top: 33%; left: 73%; }
        .bh-v5 { top: 65%; left: 18%; }
        .bh-v6 { top: 63%; left: 44%; width: 19px; height: 19px; }

        /* Main Typography Wrap Layer */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(44px, 12.5vw, 70px);
            line-height: 0.82;
            color: var(--text-main);
            position: relative;
            /* Specialized Thick 3D Comic Extrusion Mapping Stacks */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 11px 0 var(--wood-darkest),
                 0px 16px 18px rgba(0,0,0,0.65);
            letter-spacing: -2px;
        }

        .title-row.gumshoe {
            transform: scaleX(0.96);
        }

        /* Magnifying Glass Vector Element Inside Letter 'O' Frame */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(44px, 12.5vw, 70px);
        }

        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 2px;
            width: 85%;
            height: 85%;
            border: 8px solid var(--text-stroke);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }

        /* Magnifying Lens Inner Rim Highlight */
        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -9px;
            right: -2px;
            width: 11px;
            height: 27px;
            background: var(--text-stroke);
            border-radius: 4px;
            transform: rotate(-45deg);
            z-index: 3;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .title-row.empire {
            font-size: clamp(52px, 14.5vw, 82px);
            color: var(--text-gold);
            margin-top: 8px;
            letter-spacing: -1px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-gold-shadow),
                 0px  9px 0 var(--text-stroke),
                 0px 14px 0 var(--wood-darkest),
                 0px 20px 22px rgba(0,0,0,0.75);
        }

        /* ==========================================================================
           6. INTERLOCKING ACTION RIBBONS & CENTRAL STAR SHAPE
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 108%;
            margin-top: -36px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 11px 18px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(13px, 3.8vw, 19px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 7px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
            transform: rotate(-4deg) translateX(8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-left: none;
            transform: rotate(3deg) translateX(-8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        /* Pure CSS Star polygon layout mapping setup */
        .center-star-badge {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ffe066 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.26) rotate(-5deg);
            filter: drop-shadow(0px 5px 0px var(--text-stroke));
        }

        /* ==========================================================================
           7. HANGING BRASS DETAILS PLAQUE BLOCK LAYER
           ========================================================================== */
        .description-plaque-shell {
            width: 90%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 14px 20px;
            margin-top: 16px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 16px 26px var(--ambient-shadow-deep);
            position: relative;
            z-index: 4;
        }

        /* Left/Right Metal Stud Pins hardware elements */
        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }
        .description-plaque-shell::before { left: 12px; }
        .description-plaque-shell::after { right: 12px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(13px, 3.5vw, 18px);
            color: #261508;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           8. LOWER LOADING SYSTEM UI INTERFACE TRACKER
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 45px;
            margin-bottom: 15px;
            z-index: 10;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 5px rgba(0,0,0,0.85);
            animation: textPulseEffect 2s infinite ease-in-out;
        }

        /* Precision Outer Progress Containment shell */
        .progress-bar-shell {
            width: 100%;
            height: 30px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 40px;
            padding: 3px;
            box-shadow: 
                inset 0 5px 12px rgba(0,0,0,0.95),
                0 4px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
        }

        /* High-Definition Juice Filling Fluid Bars Meter (Matches Snapshot 60%) */
        .progress-bar-fluid {
            width: 60%; 
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 30px;
            box-shadow: inset 0 3px 5px rgba(255,255,255,0.65);
            transition: width 0.4s ease-out;
        }

        /* Gameplay Tips Box Contexts Wrapper Frame */
        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 12px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(13px, 3.6vw, 17px);
            color: #fce3c3;
            line-height: 1.4;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.9),
                 1px -1px 0 rgba(0,0,0,0.9),
                -1px  1px 0 rgba(0,0,0,0.9),
                 1px  1px 0 rgba(0,0,0,0.9),
                 0px 4px 5px rgba(0,0,0,1);
        }

        /* ==========================================================================
           9. CORE ANIMATION ENGINE KEYS
           ========================================================================== */
        @keyframes textPulseEffect {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.92; transform: scale(0.98); }
        }

        /* ==========================================================================
