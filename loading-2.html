<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - Ultimate 100% Pure CSS UI Replica Engine</title>
    
    <!-- Premium Font Integrations for Cartoon Game UI Mapping -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=Russo+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. MASTER RENDERING ENGINE RESET & COMPREHENSIVE VARIABLE MANIFEST
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Hyper-Targeted Palette Sampling Directly From The Graphic Pieces */
            --wood-darkest: #1e0e05;
            --wood-shadow: #3b2011;
            --wood-base: #79451c;
            --wood-mid: #955e2e;
            --wood-light: #b67d49;
            --wood-highlight: #ddaa71;
            
            --text-main: #ffffff;
            --text-stroke: #160a03;
            --text-gold-light: #fff0be;
            --text-gold: #fecb4e;
            --text-gold-shadow: #bf8614;
            
            --btn-blue-fill: #1964b7;
            --btn-blue-dark: #0e3f79;
            --btn-green-fill: #439a13;
            --btn-green-dark: #205406;
            
            --plaque-bg-main: #dfb274;
            --plaque-bg-dark: #b88b4d;
            --plaque-border: #4a2d12;
            
            --progress-container: #1b1109;
            --progress-stroke: #452915;
            --progress-fill-top: #82e717;
            --progress-fill-mid: #52a90c;
            --progress-fill-bot: #266400;
            
            --ambient-shadow-deep: rgba(0, 0, 0, 0.9);
            
            /* Office Palette Matrix Variables */
            --wall-base: #625c4f;
            --wall-shadow: #4d473b;
            --floor-base: #3b4547;
            --floor-shadow: #283032;
            --corkboard-base: #986d49;
            --desk-wood: #482a17;
            --desk-dark: #231207;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0c0a08;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           2. ANTI-SIDEWAYS SCROLL STAGE & PROCEDURAL GRAPHIC INTERIOR ENVIRONMENT
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6vh 20px 4vh 20px;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        /* Pure CSS Environmental Backdrop Engine */
        .office-room-renderer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Room molding horizontal divider split */
                linear-gradient(to bottom, transparent 52%, #221c17 52%, #2d2620 52.5%, #16120e 53.5%, transparent 53.5%),
                /* Overall vertical vignette split lighting */
                linear-gradient(to right, rgba(0,0,0,0.35) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.35) 100%),
                /* Main Room Wall to Floor Partition Matrix */
                linear-gradient(to bottom, var(--wall-base) 0%, var(--wall-shadow) 52%, var(--floor-base) 52%, var(--floor-shadow) 100%);
            z-index: -20;
        }

        /* Investigation Board Component Geometry */
        .board-canvas {
            position: absolute;
            left: -15px;
            top: 30%;
            width: 210px;
            height: 230px;
            background: #361f10;
            border: 10px solid #1c0f07;
            border-radius: 4px;
            box-shadow: 4px 12px 25px rgba(0,0,0,0.6);
            transform: perspective(800px) rotateY(28deg);
            z-index: -15;
        }
        .board-canvas::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: var(--corkboard-base);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }
        /* Intricate String Connections & Pinned Clues Simulation */
        .board-canvas::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: 
                /* Red Thread Vectors */
                linear-gradient(35deg, transparent 40%, #a72323 41%, #a72323 43%, transparent 44%),
                linear-gradient(-45deg, transparent 48%, #861818 49%, #861818 51%, transparent 52%),
                /* Pinned Square Document Notes */
                radial-gradient(circle at 30% 25%, #ebd7ab 22px, transparent 23px),
                radial-gradient(circle at 75% 45%, #e1c087 25px, transparent 26px),
                radial-gradient(circle at 45% 75%, #dec99c 20px, transparent 21px),
                radial-gradient(circle at 25% 60%, #eadaad 18px, transparent 19px);
            background-size: 100% 100%;
            opacity: 0.75;
        }

        /* Multi-Pane Window & Blinds Node Framework */
        .window-aperture {
            position: absolute;
            right: -10px;
            top: 24%;
            width: 190px;
            height: 290px;
            background: linear-gradient(to bottom, #7fa2ab, #45626b);
            border: 12px solid #231911;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), -8px 12px 24px rgba(0,0,0,0.5);
            transform: perspective(800px) rotateY(-22deg);
            z-index: -14;
        }
        /* Venetian Blind Shadows mapping out Cityscape Shadows inside glass */
        .window-aperture::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: 
                /* City Grid Backdrop Block Silhouette */
                linear-gradient(to right, transparent 20%, rgba(47,60,63,0.7) 20%, rgba(47,60,63,0.7) 50%, transparent 50%),
                linear-gradient(to right, transparent 60%, rgba(35,46,48,0.7) 60%, rgba(35,46,48,0.7) 90%, transparent 90%),
                /* Horizontal Blind Blades */
                repeating-linear-gradient(transparent 0px, transparent 9px, #120e0a 9px, #120e0a 15px);
            opacity: 0.85;
        }

        /* Executive Heavy Mahogany Desk Frame Node */
        .desk-monolith {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 490px;
            height: 220px;
            background: linear-gradient(to bottom, var(--desk-wood), var(--desk-dark));
            border-top: 15px solid #5a351d;
            border-radius: 4px;
            box-shadow: 
                0 4px 0 #180b04,
                0 25px 40px rgba(0,0,0,0.95);
            z-index: -10;
        }
        /* Desk Details: Panel Inserts, Phone, and Stacked Files */
        .desk-monolith::before {
            content: '';
            position: absolute;
            top: 25px; left: 30px; width: 120px; height: 150px;
            background: #361f10;
            border: 4px solid #160c06;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .desk-monolith::after {
            content: '';
            position: absolute;
            top: 25px; right: 30px; width: 120px; height: 150px;
            background: #361f10;
            border: 4px solid #160c06;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Desk Accessories & Cluttered Investigation Files Asset Node */
        .desk-clutter-group {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            width: 460px;
            height: 40px;
            z-index: -9;
            pointer-events: none;
        }
        /* Left Paper Pile */
        .clutter-papers-left {
            position: absolute;
            left: 40px; bottom: 0;
            width: 95px; height: 32px;
            background: #d5be9b;
            border: 3px solid #1a1008;
            border-radius: 2px;
            box-shadow: -4px 6px 15px rgba(0,0,0,0.5);
            transform: rotate(-3deg);
        }
        .clutter-papers-left::before {
            content: ''; position: absolute;
            top: -8px; left: 5px; width: 85px; height: 8px;
            background: #cbab7d; border: 3px solid #1a1008;
            transform: rotate(6deg);
        }
        /* Antique Rotary Telephone Silhouette Node */
        .clutter-phone-center {
            position: absolute;
            left: 55%; bottom: -5px;
            width: 55px; height: 40px;
            background: #181513;
            border: 4px solid #080706;
            border-radius: 8px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.6);
        }

        /* High Stacked Cardboard Storage Boxes On Floor Left */
        .floor-boxes-stack {
            position: absolute;
            left: 15px;
            bottom: 12%;
            width: 120px;
            height: 100px;
            background: #896544;
            border: 5px solid #331e0c;
            box-shadow: inset -12px -12px 0 rgba(0,0,0,0.1), 6px 18px 30px rgba(0,0,0,0.85);
            z-index: -8;
        }
        .floor-boxes-stack::before {
            content: '';
            position: absolute;
            top: -18px; left: -5px; width: 130px; height: 24px;
            background: #9d7652;
            border: 5px solid #331e0c;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3);
        }
        /* Lower Overlapping Box asset split */
        .floor-boxes-stack-lower {
            position: absolute;
            left: 65px;
            bottom: 6%;
            width: 105px;
            height: 85px;
            background: #765435;
            border: 5px solid #291607;
            box-shadow: 8px 12px 25px rgba(0,0,0,0.8);
            transform: rotate(-6deg);
            z-index: -7;
        }

        /* Trench Coat Rack Silhouette Node Assembly on Right side */
        .coat-rack-node {
            position: absolute;
            right: 15px;
            bottom: 8%;
            width: 70px;
            height: 280px;
            z-index: -8;
            pointer-events: none;
        }
        /* The structural wooden pole stand base */
        .rack-pole {
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 10px; height: 280px;
            background: #23140a;
            box-shadow: 4px 0 10px rgba(0,0,0,0.4);
        }
        .rack-pole::before {
            content: ''; position: absolute;
            bottom: 0; left: -25px; width: 60px; height: 15px;
            background: #160c06; border-radius: 4px;
        }
        /* The Trench coat draping form factor geometry */
        .rack-coat-silhouette {
            position: absolute;
            top: 45px; left: -10px;
            width: 80px; height: 170px;
            background: #98784b;
            border: 5px solid #23180c;
            border-radius: 18px 18px 8px 8px;
            box-shadow: inset -15px 0 25px rgba(0,0,0,0.3), -8px 15px 20px rgba(0,0,0,0.6);
        }
        /* Detective Fedora Hat hanging on top peg */
        .rack-hat-silhouette {
            position: absolute;
            top: 12px; left: -5px;
            width: 75px; height: 35px;
            background: #463b33;
            border: 4px solid #16120f;
            border-radius: 20px 20px 4px 4px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.5);
            transform: rotate(8deg);
        }

        /* Scattered Papers Littering Floor Perspective */
        .floor-litter-papers {
            position: absolute;
            right: 80px;
            bottom: 15%;
            width: 80px; height: 50px;
            background: #dfcfb3;
            border: 2px solid #231a10;
            transform: perspective(400px) rotateX(40deg) rotateZ(25deg);
            box-shadow: 3px 6px 10px rgba(0,0,0,0.4);
            z-index: -6;
        }

        /* Atmospheric Focal Depth Engine Configuration Layer */
        .lens-blur-engine {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 10%, rgba(0,0,0,0.5) 95%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -5;
            pointer-events: none;
        }

        /* ==========================================================================
           3. CENTRAL BLOCK INTERFACE SCALER ENGINE (MAX DATA RETENTION MATRIX)
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* ==========================================================================
           4. "GUMSHOE EMPIRE" ROBUST LOGO SIGNBOARD SPECIFICATION
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 42%, var(--wood-base) 88%, var(--wood-shadow) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 22px;
            padding: 38px 16px 58px 16px;
            box-shadow: 
                0 16px 0 var(--wood-darkest),
                0 25px 35px var(--ambient-shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: polygon(2.5% 0%, 97.5% 0%, 100% 100%, 0% 100%);
        }

        /* Procedural Organic Wood Grain Striations */
        .wood-grain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        .wood-plank-joint {
            position: absolute;
            left: 0; width: 100%; height: 8px;
            background: var(--text-stroke);
            z-index: 2;
        }
        .joint-alpha { top: 35.5%; }
        .joint-beta { top: 68%; }

        /* Embedded Splinter Bullet Impacts Vectors */
        .bullet-hole-vector {
            position: absolute;
            width: 19px;
            height: 19px;
            background: #0d0704;
            border-radius: 50%;
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.98),
                0 0 0 4px var(--wood-highlight),
                0 0 0 6px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 30%; left: 7.5%; }
        .bh-v2 { top: 32%; left: 35.5%; width: 17px; height: 17px; }
        .bh-v3 { top: 29%; left: 56.5%; }
        .bh-v4 { top: 33%; left: 70.5%; width: 18px; height: 18px; }
        .bh-v5 { top: 65%; left: 17.5%; }
        .bh-v6 { top: 63%; left: 43.5%; }

        /* Typography Vector Wrappers */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(48px, 13vw, 72px);
            line-height: 0.78;
            color: var(--text-main);
            position: relative;
            letter-spacing: -2.5px;
            /* Extra Thick Structural Drop Shadow Stacking */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 12px 0 var(--wood-darkest),
                 0px 19px 16px rgba(0,0,0,0.7);
        }

        .title-row.gumshoe {
            transform: scaleX(0.96);
        }

        /* Magnifying Glass Vector Architecture Seamlessly Embedded Inside Letter O */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(48px, 13vw, 72px);
        }
        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: 1px; left: 3px; width: 80%; height: 80%;
            border: 8px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }
        /* Lens Silhouette Inner Graphics */
        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -7px; right: 1px; width: 10px; height: 24px;
            background: var(--text-stroke);
            border-radius: 4px;
            transform: rotate(-45deg);
            z-index: 3;
        }
        /* Handglass Inner Mystery Silhouette Profile Node */
        .magnifier-glass-shadow {
            position: absolute;
            top: 14px; left: 16px; width: 22px; height: 26px;
            background: #251c15;
            border-radius: 40% 40% 50% 50%;
            z-index: 5;
            transform: rotate(15deg);
        }
        .magnifier-glass-shadow::before {
            content: ''; position: absolute;
            top: -6px; left: 3px; width: 16px; height: 10px;
            background: #251c15; border-radius: 50%;
        }

        /* Bottom Row "EMPIRE" Configuration Matrix */
        .title-row.empire {
            font-size: clamp(56px, 15vw, 84px);
            color: var(--text-gold);
            margin-top: 12px;
            letter-spacing: -1.5px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-gold-shadow),
                 0px 10px 0 var(--text-stroke),
                 0px 16px 0 var(--wood-darkest),
                 0px 24px 22px rgba(0,0,0,0.8);
        }

        /* ==========================================================================
           5. INTERLOCKING FLANKED ACTION RIBBONS & GOLD BADGE STAR
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify(ACTUAL): center;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -36px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 12px 20px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(14px, 3.8vw, 19px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 7px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 14px;
            border-bottom-left-radius: 14px;
            border-right: none;
            transform: rotate(-3.5deg) translateX(6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 14px;
            border-bottom-right-radius: 14px;
            border-left: none;
            transform: rotate(2.5deg) translateX(-6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .center-star-badge {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ffe993 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.3) rotate(-4deg);
            filter: drop-shadow(0px 6px 0px var(--text-stroke));
        }

        /* ==========================================================================
           6. DESCRIPTION METALLIC BRASS PLAQUE NODE
           ========================================================================== */
        .description-plaque-shell {
            width: 92%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 14px 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 20px 25px var(--ambient-shadow-deep);
            position: relative;
            z-index: 4;
        }

        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.7);
        }
        .description-plaque-shell::before { left: 14px; }
        .description-plaque-shell::after { right: 14px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(14px, 3.6vw, 18px);
            color: #241407;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. LOWER PROGRESS TRACKER UI SYSTEM (STRICT ANTI-SIDE SCROLL FIX)
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10vh;
            margin-bottom: 10px;
            z-index: 5;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 6px rgba(0,0,0,0.95);
        }

        .progress-bar-shell {
            width: 100%;
            height: 30px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 35px;
            padding: 3px;
            box-shadow: 
                inset 0 4px 12px rgba(0,0,0,0.95),
                0 3px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-bar-fluid {
            width: 73%; /* Hard Synced to Match exact snapshot percentage value */
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 6px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 3.6vw, 17px);
            color: #f7dfbe;
            line-height: 1.45;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.95),
                 1px -1px 0 rgba(0,0,0,0.95),
                -1px  1px 0 rgba(0,0,0,0.95),
                 1px  1px 0 rgba(0,0,0,0.95),
                 0px 3px 5px rgba(0,0,0,0.95);
        }

        /* ==========================================================================
           8. DEVICE ADAPTIVE MEDIA MATRIX RESPONSIVENESS
