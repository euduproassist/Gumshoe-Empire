<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Pure CSS Replica Engine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=Russo+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE ENGINE RESET & CORE VARIABLES
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --wood-darkest: #160802;
            --wood-shadow: #2d180a;
            --wood-base: #663914;
            --wood-mid: #824f24;
            --wood-light: #a66f3c;
            --wood-highlight: #cf9559;
            
            --text-main: #ffffff;
            --text-stroke: #1b0f05;
            --text-gold-light: #fff2cc;
            --text-gold: #fbc636;
            --text-gold-shadow: #b3790b;
            
            --btn-blue-fill: #165bb0;
            --btn-blue-dark: #0a3366;
            --btn-green-fill: #439615;
            --btn-green-dark: #1f4f05;
            
            --plaque-bg-main: #e2b370;
            --plaque-bg-dark: #b88642;
            --plaque-border: #4a290a;
            
            --progress-container: #170d06;
            --progress-stroke: #45240c;
            --progress-fill-top: #85e812;
            --progress-fill-mid: #54aa0a;
            --progress-fill-bot: #256300;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: #0d0b09;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           2. RESPONSIVE CONTAINER (ANTI-SIDEWAYS SCROLL WRAPPER)
           ========================================================================== */
        .stage-viewport {
            width: 100%;
            min-height: 100vh;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6vh 16px 4vh 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ==========================================================================
           3. ADVANCED PURE CSS DETECTIVE OFFICE BACKGROUND GRAPHIC SCENE
           ========================================================================== */
        .office-scene-engine {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* Wall Molding Divider Trim */
                linear-gradient(to bottom, transparent 38%, #363027 38%, #211c15 39%, transparent 39%),
                /* Room Ambient Perspective Divide */
                linear-gradient(to bottom, #726b5d 0%, #5d5649 38%, #363f41 38%, #22292b 100%);
            z-index: -10;
        }

        /* Pure CSS Window Node & Foggy Sky High-Rise City Line */
        .css-window-node {
            position: absolute;
            right: 4%; top: 22%;
            width: 250px; height: 320px;
            background: 
                /* Distant Gray Tall Buildings Silhouettes */
                linear-gradient(to top, #4d585a 40%, transparent 40%),
                linear-gradient(90deg, transparent 20%, #434d4f 20%, #434d4f 45%, transparent 45%),
                linear-gradient(90deg, transparent 55%, #475254 55%, #475254 85%, transparent 85%),
                linear-gradient(to bottom, #7e9498, #5b6f72);
            background-size: 100% 100%, 60px 140px, 80px 180px, 100% 100%;
            background-position: 0 0, 10px 80px, 120px 40px, 0 0;
            background-repeat: no-repeat;
            border: 12px solid #28211a;
            border-bottom-width: 18px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), -10px 15px 30px rgba(0,0,0,0.4);
        }
        /* Venetian Blinds Shadows Matrix */
        .css-window-node::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent 0px, transparent 10px, rgba(24, 20, 15, 0.75) 10px, rgba(24, 20, 15, 0.75) 14px);
        }

        /* Pure CSS Investigation Cork Board Node with Yarn Connections */
        .css-board-node {
            position: absolute;
            left: 2%; top: 28%;
            width: 240px; height: 170px;
            background: #875c36;
            border: 8px solid #36200f;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 8px 12px 25px rgba(0,0,0,0.4);
            transform: perspective(800px) rotateY(15deg);
        }
        /* Case Files, Sticky Notes, and Red String Vector Layout Simulator */
        .css-board-node::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: 
                linear-gradient(35deg, transparent 40%, #a62419 40%, #a62419 42%, transparent 42%),
                linear-gradient(-45deg, transparent 48%, #a62419 48%, #a62419 50%, transparent 50%),
                radial-gradient(ellipse at 30% 30%, #ebdca8 30px, transparent 31px),
                radial-gradient(ellipse at 70% 60%, #e8cca2 25px, transparent 26px),
                radial-gradient(ellipse at 45% 75%, #ebdca8 20px, transparent 21px);
            background-size: 100% 100%;
            opacity: 0.8;
        }

        /* Pure CSS Heavy Wooden Executive Desk Node */
        .css-desk-node {
            position: absolute;
            left: 50%; bottom: 18%;
            transform: translateX(-50%);
            width: 520px; height: 210px;
            background: linear-gradient(to bottom, #442511, #1f0f05);
            border-top: 12px solid #5c3519;
            border-radius: 4px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.8);
        }
        /* Stacked Legal Files & Classic Vintage Desk Phone */
        .css-desk-node::before {
            content: '';
            position: absolute;
            top: -22px; left: 40px;
            width: 85px; height: 22px;
            background: #d9c596;
            border: 2px solid #21150a;
            box-shadow: 0 -8px 0 #cfba8c, 0 -16px 0 #d9c596, -3px 5px 10px rgba(0,0,0,0.4);
        }
        .css-desk-node::after {
            content: '';
            position: absolute;
            top: -26px; right: 140px;
            width: 50px; height: 26px;
            background: #141210;
            border-radius: 6px 6px 2px 2px;
            box-shadow: -2px 4px 8px rgba(0,0,0,0.5);
        }

        /* Pure CSS Desk Chair Silhouette Backing Frame */
        .css-chair-node {
            position: absolute;
            left: 36%; bottom: 34%;
            width: 110px; height: 120px;
            background: linear-gradient(to bottom, #1f1d1a, #0d0c0b);
            border-radius: 20px 20px 5px 5px;
            box-shadow: inset 0 8px 0 rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.6);
        }

        /* Pure CSS Stacked Cardboard Archive Box Elements on Left Floor Frame */
        .css-boxes-node {
            position: absolute;
            left: 5%; bottom: 12%;
            width: 115px; height: 95px;
            background: #8a6543;
            border: 4px solid #3d2612;
            box-shadow: inset -12px -12px 0 rgba(0,0,0,0.1), 5px 12px 20px rgba(0,0,0,0.6);
        }
        .css-boxes-node::before {
            content: '';
            position: absolute;
            top: -18px; left: -4px; width: 123px; height: 22px;
            background: #9c7550;
            border: 4px solid #3d2612;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
        }

        /* Pure CSS Vintage Hat & Trench Coat Stand Node On the Right Side Floor Frame */
        .css-coatrack-node {
            position: absolute;
            right: 4%; bottom: 15%;
            width: 14px; height: 360px;
            background: #23160b;
            box-shadow: 8px 10px 20px rgba(0,0,0,0.4);
        }
        /* Hanging Silhouette Coat Layers Shape Wrap */
        .css-coatrack-node::before {
            content: '';
            position: absolute;
            top: 60px; left: -28px;
            width: 70px; height: 190px;
            background: linear-gradient(to right, #91754b, #6b5331);
            border-radius: 25px 25px 10px 10px;
            box-shadow: 5px 10px 15px rgba(0,0,0,0.5);
        }
        /* Fedoar Detective Hat Topping Variant Piece */
        .css-coatrack-node::after {
            content: '';
            position: absolute;
            top: 25px; left: -32px;
            width: 78px; height: 32px;
            background: #3b332b;
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.1), 0 6px 10px rgba(0,0,0,0.4);
        }

        /* The Focal Depth Atmospheric Blur Filter Engine Overlay Layer */
        .cinematic-blur-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(12,9,7,0.55) 95%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -4;
            pointer-events: none;
        }

        /* ==========================================================================
           4. GUI CONTAINER & LOGO BILLBOARD ASSEMBLY
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
        }

        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 45%, var(--wood-base) 90%, var(--wood-shadow) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 24px;
            padding: 34px 16px 52px 16px;
            box-shadow: 
                0 15px 0 var(--wood-darkest),
                0 22px 30px rgba(0,0,0,0.65);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: polygon(4% 0%, 96% 0%, 100% 100%, 0% 100%);
        }

        .wood-grain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px, transparent 2px, transparent 5px);
            pointer-events: none;
            z-index: 1;
        }

        .wood-plank-joint {
            position: absolute;
            left: 0; width: 100%; height: 7px;
            background: var(--text-stroke);
            z-index: 2;
        }
        .joint-alpha { top: 35%; }
        .joint-beta { top: 68%; }

        /* Clean High-Fidelity Bullet Impacts */
        .bullet-hole-vector {
            position: absolute;
            width: 19px; height: 19px;
            background: #090604;
            border-radius: 50%;
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.95),
                0 0 0 4px var(--wood-highlight),
                0 0 0 6px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 28%; left: 9%; }
        .bh-v2 { top: 31%; left: 37%; width: 17px; height: 17px; }
        .bh-v3 { top: 27%; left: 55%; }
        .bh-v4 { top: 32%; left: 72%; width: 18px; height: 18px; }
        .bh-v5 { top: 65%; left: 19%; }
        .bh-v6 { top: 62%; left: 45%; }

        /* Typography Vector Wrappers */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(44px, 12vw, 68px);
            line-height: 0.82;
            color: var(--text-main);
            position: relative;
            letter-spacing: -2px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 12px 0 var(--wood-darkest),
                 0px 18px 15px rgba(0,0,0,0.6);
        }

        /* Magnifying Glass Vector Implemented Seamlessly into the Letter 'O' Outline */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(44px, 12vw, 68px);
        }
        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: 2px; left: 4px; width: 80%; height: 80%;
            border: 8px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }
        /* The Offset Graphic Lens Outline Inside the Lens Body */
        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            top: 14px; left: 16px; width: 32%; height: 32%;
            border: 4px solid #110903;
            border-radius: 50%;
            background: transparent;
            z-index: 5;
            opacity: 0.8;
        }
        /* Handle Attachment Extension */
        .magnifier-handle {
            position: absolute;
            bottom: -8px; right: 0px; width: 10px; height: 24px;
            background: var(--text-stroke);
            border-radius: 4px;
            transform: rotate(-45deg);
            z-index: 3;
        }

        .title-row.empire {
            font-size: clamp(52px, 14vw, 80px);
            color: var(--text-gold);
            margin-top: 12px;
            letter-spacing: -1px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-gold-shadow),
                 0px  9px 0 var(--text-stroke),
                 0px 15px 0 var(--wood-darkest),
                 0px 22px 20px rgba(0,0,0,0.7);
        }

        /* ==========================================================================
           5. FLANKED ACTION RIBBONS & GOLD BADGE STAR
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -32px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 12px 18px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(13px, 3.6vw, 18px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 7px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
            transform: rotate(-4deg) translateX(6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-left: none;
            transform: rotate(3deg) translateX(-6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .center-star-badge {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #ffe57f 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.28) rotate(-4deg);
            filter: drop-shadow(0px 5px 0px var(--text-stroke));
        }

        /* ==========================================================================
           6. METALLIC BRASS INFORMATION PLAQUE
           ========================================================================== */
        .description-plaque-shell {
            width: 92%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 12px;
            padding: 12px 18px;
            margin-top: 18px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 18px 25px rgba(0,0,0,0.7);
            position: relative;
            z-index: 4;
        }

        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px; height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }
        .description-plaque-shell::before { left: 12px; }
        .description-plaque-shell::after { right: 12px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(13px, 3.5vw, 17px);
            color: #241407;
            line-height: 1.35;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. PROGRESS TRACKER SYSTEM UI
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 6vh;
            margin-bottom: 20px;
            z-index: 10;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 7.5vw, 34px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  6px 6px rgba(0,0,0,0.95);
        }

        .progress-bar-shell {
            width: 100%; height: 30px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 30px;
            padding: 3px;
            box-shadow: 
                inset 0 4px 10px rgba(0,0,0,0.95),
                0 3px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 18px;
            position: relative;
        }

        .progress-bar-fluid {
            width: 68%; /* Snapshot Progress Value Scale Anchor */
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 8px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(13px, 3.6vw, 16px);
            color: #f7dfbe;
            line-height: 1.4;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.95),
                 1px -1px 0 rgba(0,0,0,0.95),
                -1px  1px 0 rgba(0,0,0,0.95),
                 1px  1px 0 rgba(0,0,0,0.95),
                 0px 3px 5px rgba(0,0,0,0.95);
        }

        /* ==========================================================================
           8. VIEWPORT SIZE VARIATION ADAPTERS (MAX RESPONSIVENESS)
           ========================================================================== */
        @media screen and (max-width: 600px) {
            .css-desk-node { width: 120%; }
            .css-window-node { right: -20px; scale: 0.85; }
            .css-board-node { left: -30px; scale: 0.85; }
            .css-coatrack-node { right: -10px; scale: 0.9; }
        }

        @media screen and (max-height: 740px) {
            .stage-viewport { padding-top: 3vh; }
            .loading-status-group { margin-top: 3vh; }
            .wood-logo-billboard { padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <!-- CSS Render Engine Node Assemblies -->
    <div class="office-scene-engine"></div>
    <div class="css-window-node"></div>
    <div class="css-board-node"></div>
    <div class="css-chair-node"></div>
    <div class="css-desk-node"></div>
    <div class="css-boxes-node"></div>
    <div class="css-coatrack-node"></div>
    <div class="cinematic-blur-overlay"></div>

    <!-- Active Structural Viewport Engine Frame -->
    <main class="stage-viewport" id="gameViewport">
        
        <!-- Central Interface Hub Component Block -->
        <div class="gui-main-container">
            
            <!-- Billboard Main Header Assembly Piece -->
            <div class="wood-logo-billboard">
                <div class="wood-grain-overlay"></div>
                <div class="wood-plank-joint joint-alpha"></div>
                <div class="wood-plank-joint joint-beta"></div>

                <div class="bullet-hole-vector bh-v1"></div>
                <div class="bullet-hole-vector bh-v2"></div>
                <div class="bullet-hole-vector bh-v3"></div>
                <div class="bullet-hole-vector bh-v4"></div>
                <div class="bullet-hole-vector bh-v5"></div>
                <div class="bullet-hole-vector bh-v6"></div>

                <div class="title-text-wrap">
                    <h1 class="title-row gumshoe">
                        GUMSH<span class="magnifier-embedded-node">O<span class="magnifier-handle"></span></span>E
                    </h1>
                    <h1 class="title-row empire">EMPIRE</h1>
                </div>
            </div>

            <!-- Interlocking Subtitle Badges Wing Layout -->
            <div class="ribbon-badge-row">
                <div class="ribbon-wing left-blue">Start Small</div>
                <div class="center-star-badge"></div>
                <div class="ribbon-wing right-green">Crack Cases</div>
            </div>

            <!-- Hanging Brass Plaque Decal -->
            <div class="description-plaque-shell">
                <p>From Low-Grade P.I.<br>To The World's Best P.I.!</p>
            </div>
            
        </div>

        <!-- Lower Status Counter Loading Module Block -->
        <div class="loading-status-group">
            <h2 class="loading-title-text">Loading...</h2>
            
            <div class="progress-bar-shell">
                <div class="progress-bar-fluid"></div>
            </div>

            <div class="gameplay-tip-box">
                <p>Tip: Check every detail. The truth is always in the evidence.</p>
            </div>
        </div>

    </main>

</body>
</html>
