<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - 100% Pure CSS Recreation</title>
    
    <!-- Premium Fonts for Cartoon & Comic Typography Matching the Image Exactly -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=Russo+One&family=Special+Elite&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE ENGINE RESET & PERFORMANCE CONFIGURATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Hyper-Targeted Palette Sampling Directly From The Graphic Pieces */
            --wood-darkest: #1e0e05;
            --wood-shadow: #3a2010;
            --wood-base: #78441b;
            --wood-mid: #945d2d;
            --wood-light: #b57c48;
            --wood-highlight: #dca76e;
            
            --text-main: #ffffff;
            --text-stroke: #160a03;
            --text-gold-light: #fff0be;
            --text-gold: #f8cb52;
            --text-gold-shadow: #c08716;
            
            --btn-blue-fill: #1964b7;
            --btn-blue-dark: #0e3f79;
            --btn-green-fill: #439a13;
            --btn-green-dark: #205406;
            
            --plaque-bg-main: #dfb274;
            --plaque-bg-dark: #b88b4d;
            --plaque-border: #4a2d12;
            
            --progress-container: #1b1109;
            --progress-stroke: #452915;
            --progress-fill-top: #82e717;
            --progress-fill-mid: #52a90c;
            --progress-fill-bot: #266400;
            
            --ambient-shadow-deep: rgba(0, 0, 0, 0.75);
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0c0a08;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           2. ANTI-SIDEWAYS SCROLL ADAPTIVE VIEWPORT STAGE & SCENE GENERATOR
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 40px 20px;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
            overflow-y: visible;
        }

        /* 
           PURE CSS DETECTIVE OFFICE BACKGROUND GRAPHIC ENGINE
           Reconstructs walls, floor perspective lines, shadows, and base illumination values
        */
        .office-background-engine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Wall molding horizontal divider split */
                linear-gradient(to bottom, transparent 62%, #221c17 62%, #221c17 63.5%, transparent 63.5%),
                /* Perspective Floor shadow grading */
                linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 40%),
                /* Main Room Split: Top Wall Cream Brown to Bottom Slate Green Blue Floor */
                linear-gradient(to bottom, #726a5a 0%, #585143 62%, #384244 62%, #232c2d 100%);
            z-index: -5;
        }

        /* Pure CSS Render Node: The Investigation Pin Board on the Left Wall */
        .css-asset-pinboard {
            position: absolute;
            left: -20px;
            top: 30%;
            width: 210px;
            height: 150px;
            background: #4e321b;
            border: 6px solid #28170b;
            border-radius: 4px;
            box-shadow: 3px 6px 12px rgba(0,0,0,0.4);
            transform: perspective(400px) rotateY(15deg) rotate(2deg);
            opacity: 0.45;
            z-index: -4;
        }
        .css-asset-pinboard::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: #8e6544;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        /* Clustered index string links on the board */
        .css-asset-pinboard::after {
            content: '';
            position: absolute;
            width: 80%; height: 2px; background: #b02318;
            top: 40%; left: 10%; transform: rotate(15deg);
        }

        /* Pure CSS Render Node: The Detective Window and Blinds Overlapping right frame */
        .css-asset-window {
            position: absolute;
            right: 5%;
            top: 24%;
            width: 160px;
            height: 210px;
            background: linear-gradient(to bottom, #7ba0a9, #4a6871);
            border: 8px solid #3d3429;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 5px 10px 15px rgba(0,0,0,0.3);
            opacity: 0.35;
            z-index: -4;
        }
        /* Venetian Blinds Bars */
        .css-asset-window::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent 0px, transparent 6px, #251f18 6px, #251f18 10px);
        }

        /* Pure CSS Render Node: Centered Big Heavy Mahogany Detective Desk Frame */
        .css-asset-desk {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 440px;
            height: 160px;
            background: linear-gradient(to bottom, #422613, #211107);
            border-top: 12px solid #5a351c;
            border-radius: 6px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.8);
            opacity: 0.55;
            z-index: -3;
        }
        /* Desktop Drawer Panels */
        .css-asset-desk::before {
            content: '';
            position: absolute;
            top: 25px; left: 20px; width: 110px; height: 100px;
            background: #170b04; border: 3px solid #331c0d;
            box-shadow: 0 4px 0 rgba(255,255,255,0.05);
        }

        /* Atmospheric Focal Distance Engine Blur Layer */
        .atmospheric-blur-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(0,0,0,0.65) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -2;
            pointer-events: none;
        }

        /* ==========================================================================
           3. MASTER GUI CORE STRUCTURAL GRID
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* ==========================================================================
           4. "GUMSHOE EMPIRE" MAIN MULTI-PLANK SIGNBOARD W/ SHADOW EXTRUSIONS
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 45%, var(--wood-base) 90%, var(--wood-shadow) 100%);
            border: 8px solid var(--text-stroke);
            border-radius: 20px;
            padding: 32px 16px 52px 16px;
            box-shadow: 
                0 15px 0 var(--wood-darkest),
                0 25px 35px var(--ambient-shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: polygon(2% 0%, 98% 0%, 100% 100%, 0% 100%);
        }

        .wood-grain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px, transparent 2px, transparent 5px);
            pointer-events: none;
            z-index: 1;
        }

        .wood-plank-joint {
            position: absolute;
            left: 0; width: 100%; height: 7px;
            background: var(--text-stroke);
            z-index: 2;
        }
        .joint-alpha { top: 35%; }
        .joint-beta { top: 68%; }

        /* Highly Strategic Procedural Vector Bullet Impacts */
        .bullet-hole-vector {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #0d0805;
            border-radius: 50%;
            box-shadow: 
                inset 2px 2px 4px rgba(0,0,0,0.95),
                0 0 0 4px var(--wood-highlight),
                0 0 0 6px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 28%; left: 9%; }
        .bh-v2 { top: 29%; left: 32%; width: 16px; height: 16px; }
        .bh-v3 { top: 26%; left: 54%; }
        .bh-v4 { top: 30%; left: 74%; width: 17px; height: 17px; }
        .bh-v5 { top: 63%; left: 16%; }
        .bh-v6 { top: 61%; left: 45%; }

        /* Typography Vector Wrappers */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(44px, 12vw, 68px);
            line-height: 0.82;
            color: var(--text-main);
            position: relative;
            letter-spacing: -2px;
            /* Precise Stacked Multi-Layer Graphic Shadow Mapping */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  6px 0 var(--text-stroke),
                 0px 10px 0 var(--wood-darkest),
                 0px 16px 15px rgba(0,0,0,0.65);
        }

        .title-row.gumshoe {
            transform: scaleX(0.96);
        }

        /* The Custom Handglass Vector Node built directly inside the Letter O */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(44px, 12vw, 68px);
        }
        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: 2px; left: 4px; width: 80%; height: 80%;
            border: 8px solid var(--text-stroke);
            background: #ffffff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }
        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -6px; right: 0px; width: 9px; height: 24px;
            background: var(--text-stroke);
            border-radius: 3px;
            transform: rotate(-45deg);
            z-index: 3;
        }

        /* Bottom Row "EMPIRE" Typographic Configuration Block */
        .title-row.empire {
            font-size: clamp(52px, 14vw, 78px);
            color: var(--text-gold);
            margin-top: 8px;
            letter-spacing: -1px;
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-gold-shadow),
                 0px  9px 0 var(--text-stroke),
                 0px 14px 0 var(--wood-darkest),
                 0px 20px 20px rgba(0,0,0,0.75);
        }

        /* ==========================================================================
           5. INTERLOCKING FLANKED ACTION RIBBONS & GOLD BADGE
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 106%;
            margin-top: -32px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 10px 16px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(13px, 3.6vw, 18px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 6px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
            transform: rotate(-3.5deg) translateX(6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-left: none;
            transform: rotate(3deg) translateX(-6px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .center-star-badge {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #ffe57f 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.25) rotate(-4deg);
            filter: drop-shadow(0px 4px 0px var(--text-stroke));
        }

        /* ==========================================================================
           6. DESCRIPTION METALLIC BRASS PLAQUE RENDER NODE
           ========================================================================== */
        .description-plaque-shell {
            width: 90%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 12px;
            padding: 12px 18px;
            margin-top: 16px;
            text-align: center;
            box-shadow: 
                0 8px 0 var(--plaque-border),
                0 5px 0 var(--text-stroke),
                0 15px 22px var(--ambient-shadow-deep);
            position: relative;
            z-index: 4;
        }

        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }
        .description-plaque-shell::before { left: 10px; }
        .description-plaque-shell::after { right: 10px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(13px, 3.4vw, 17px);
            color: #241407;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. LOWER PROGRESS TRACKER UI SYSTEM (VERTICAL PINNED ANCHOR)
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 80px;
            margin-bottom: 20px;
            z-index: 5;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(22px, 6.5vw, 28px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  4px 4px rgba(0,0,0,0.8);
        }

        .progress-bar-shell {
            width: 100%;
            height: 26px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 30px;
            padding: 3px;
            box-shadow: 
                inset 0 4px 8px rgba(0,0,0,0.95),
                0 3px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
        }

        .progress-bar-fluid {
            width: 70%; /* Exact visual match anchor point */
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.5);
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 8px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(13px, 3.5vw, 15px);
            color: #f7dfbe;
            line-height: 1.4;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.9),
                 1px -1px 0 rgba(0,0,0,0.9),
                -1px  1px 0 rgba(0,0,0,0.9),
                 1px  1px 0 rgba(0,0,0,0.9),
                 0px 2px 4px rgba(0,0,0,0.9);
        }

        /* ==========================================================================
           8. ULTRA DEVICE ADAPTIVE MEDIA MATRIX RESPONSIVENESS
           ========================================================================== */
        @media screen and (max-height: 760px) {
            .game-viewport { padding-top: 30px; }
            .loading-status-group { margin-top: 45px; }
            .wood-logo-billboard { padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <!-- Integrated Pure CSS Environmental Scene Node Elements -->
    <div class="office-background-engine"></div>
    <div class="css-asset-pinboard"></div>
    <div class="css-asset-window"></div>
    <div class="css-asset-desk"></div>
    <div class="atmospheric-blur-layer"></div>

    <!-- Main Mobile Fluid Scaler Stage Viewport Frame -->
    <main class="game-viewport" id="gameViewport">
        
        <!-- Central GUI Panel Block Component -->
        <div class="gui-main-container">
            
            <!-- Heavy Timber Texture Billboard Panel Outer Shell Frame -->
            <div class="wood-logo-billboard">
                <div class="wood-grain-overlay"></div>
                <div class="wood-plank-joint joint-alpha"></div>
                <div class="wood-plank-joint joint-beta"></div>

                <!-- Strategic Procedural Clean Vector Splinter Holes -->
                <div class="bullet-hole-vector bh-v1"></div>
                <div class="bullet-hole-vector bh-v2"></div>
                <div class="bullet-hole-vector bh-v3"></div>
                <div class="bullet-hole-vector bh-v4"></div>
                <div class="bullet-hole-vector bh-v5"></div>
                <div class="bullet-hole-vector bh-v6"></div>

                <!-- Typography Layer Setup -->
                <div class="title-text-wrap">
                    <h1 class="title-row gumshoe">
                        GUMSH<span class="magnifier-embedded-node">O</span>E
                    </h1>
                    <h1 class="title-row empire">EMPIRE</h1>
                </div>
            </div>

            <!-- Interlocking Subtitle Badges Flanking Star Accent Core -->
            <div class="ribbon-badge-row">
                <div class="ribbon-wing left-blue">Start Small</div>
                <div class="center-star-badge"></div>
                <div class="ribbon-wing right-green">Crack Cases</div>
            </div>

            <!-- Lower Hanging Brass Plaque Description Node -->
            <div class="description-plaque-shell">
                <p>From Low-Grade P.I.<br>To The World's Best P.I.!</p>
            </div>
            
        </div>

        <!-- Lower Status Track Indicator Sub-Component Layer -->
        <div class="loading-status-group">
            <h2 class="loading-title-text">Loading...</h2>
            
            <!-- Fluid Containment Shell Tracker -->
            <div class="progress-bar-shell">
                <div class="progress-bar-fluid" id="mainProgressBarMeter"></div>
            </div>

            <!-- Context Hint System Text Micro-copy Block -->
            <div class="gameplay-tip-box">
                <p>Tip: Check every detail. The truth is always in the evidence.</p>
            </div>
        </div>

    </main>

    <script>
        // High fidelity looping script engine loop for live verification
        document.addEventListener("DOMContentLoaded", () => {
            const meterElement = document.getElementById("mainProgressBarMeter");
            let progressTrack = 70; // Hard synced initial state matching the reference snapshot perfectly
            
            setInterval(() => {
                if (progressTrack >= 100) {
                    progressTrack = 50; // Smooth loop resets beautifully without interface breaks
                } else {
                    progressTrack += Math.random() * 1.2;
                }
                meterElement.style.width = `${Math.min(progressTrack, 100)}%`;
            }, 350);
        });
    </script>
</body>
</html>
