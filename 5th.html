<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAPO STUDIOS — Official Monogram</title>

    <!-- Google Typography Fonts for Luxury Brands -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CORE DISPLAY RESET & SIDEWAYS SCROLL PROHIBITION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            overflow-x: hidden; /* Total protection against accidental horizontal scrolling */
            overflow-y: auto;   /* Permissive fluid vertical scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================================================
           2. VIEWPORT MASTER CONTAINER
           ========================================================================== */
        .stage-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(20px, 5vw, 60px);
            position: relative;
            background: radial-gradient(circle at center, #0d0d0d 0%, #000000 100%);
            z-index: 1;
        }

        .studio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 800px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ==========================================================================
           3. PREMIUM INLINE MONOGRAM CONTAINER & EMBLEM
           ========================================================================== */
        .monogram-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: clamp(15px, 3.5vw, 30px);
        }

        .monogram-svg {
            width: clamp(240px, 45vh, 420px);
            height: auto;
            max-height: 55vh;
            /* Recreates the deep volumetric shadow casting from the photo */
            filter: drop-shadow(0px 15px 30px rgba(0, 0, 0, 0.98))
                    drop-shadow(0px 0px 35px rgba(184, 138, 40, 0.2));
        }

        /* Ambient subtle backdrop halo behind the monogram logo */
        .monogram-container::before {
            content: '';
            position: absolute;
            width: clamp(200px, 40vw, 350px);
            height: clamp(200px, 40vw, 350px);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        /* ==========================================================================
           4. GOLD DIVIDER LINES WITH CINEMATIC LENS FLARES
           ========================================================================== */
        .gold-divider-line {
            position: relative;
            width: clamp(240px, 65vw, 520px);
            height: 1px;
            background: linear-gradient(
                90deg, 
                rgba(163, 124, 34, 0) 0%, 
                rgba(255, 238, 173, 0.9) 50%, 
                rgba(163, 124, 34, 0) 100%
            );
            margin: 2px 0;
            z-index: 2;
        }

        /* Centralized anamorphic high-intensity flare point */
        .gold-divider-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 4px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 
                0 0 8px 3px #ffffff,
                0 0 20px 6px rgba(255, 223, 112, 0.95),
                0 0 45px 15px rgba(184, 138, 40, 0.5);
        }

        /* ==========================================================================
           5. BRAND NAME TYPOGRAPHY ("NAPO STUDIOS")
           ========================================================================== */
        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(22px, 4.8vw, 42px);
            font-weight: 500;
            letter-spacing: clamp(10px, 2.2vw, 22px);
            text-transform: uppercase;
            margin: clamp(14px, 3vw, 24px) 0;
            /* Visual offset correction balancing the tracking letter spacing */
            padding-left: clamp(10px, 2.2vw, 22px);
            z-index: 2;
            
            /* Realistic Vertical Gold Gradient map */
            background: linear-gradient(
                180deg, 
                #FFF7D6 0%, 
                #E5C06A 30%, 
                #B58A32 65%, 
                #6B4E11 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            filter: drop-shadow(0px 5px 12px rgba(0, 0, 0, 0.95));
        }

        /* ==========================================================================
           6. RESPONSIVE ORIENTATION PRESERVATION ENGINE
           ========================================================================== */
        .orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 4, 4, 0.98);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .phone-icon-animation {
            width: 50px;
            height: 80px;
            border: 3px solid #e5c06a;
            border-radius: 10px;
            position: relative;
            margin-bottom: 25px;
            animation: rotateDevice 2.5s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(229, 192, 106, 0.3);
        }

        .phone-icon-animation::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background-color: #e5c06a;
            border-radius: 50%;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        .orientation-text {
            color: #e5c06a;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            line-height: 1.6;
        }

        /* Displays screen overlay only on small screen displays running in vertical portrait mode */
        @media screen and (max-width: 992px) and (orientation: portrait) {
            .orientation-overlay {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- Main Panoramic Workspace Screen Viewport -->
    <main class="stage-viewport">
        <div class="studio-card">
            
            <!-- Inlined Premium Engineered SVG Interlocking Monogram Layout -->
            <div class="monogram-container">
                <svg class="monogram-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- High-Definition Metallic Gold Foil Texture Map Gradient -->
                        <linearGradient id="luxuryGoldFoil" x1="15%" y1="0%" x2="85%" y2="100%">
                            <stop offset="0%" stop-color="#543A0C" />
                            <stop offset="12%" stop-color="#9E782A" />
                            <stop offset="25%" stop-color="#DEBE67" />
                            <stop offset="38%" stop-color="#FFF5CD" />
                            <stop offset="50%" stop-color="#EAD186" />
                            <stop offset="65%" stop-color="#BD953C" />
                            <stop offset="85%" stop-color="#805A16" />
                            <stop offset="100%" stop-color="#3D2603" />
                        </linearGradient>

                        <!-- High-Contrast 3D Bevel Edge Definition Rim Light -->
                        <linearGradient id="bevelEdgeRim" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75" />
                            <stop offset="45%" stop-color="#EAD186" stop-opacity="0.25" />
                            <stop offset="100%" stop-color="#000000" stop-opacity="0.9" />
                        </linearGradient>

                        <!-- Depth-enhancing Specular Inner Emboss Filter Shader -->
                        <filter id="internalChiselDepth" x="-10%" y="-10%" width="120%" height="120%">
                            <feGaussianBlur stdDeviation="2" result="blurLayer"/>
                            <feOffset dx="3" dy="3"/>
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.8"/>
                            </feComponentTransfer>
                            <feComposite operator="xor" in2="SourceGraphic"/>
                        </filter>
                    </defs>

                    <!-- Primary Master Graphics Render Group Layer -->
                    <g fill="url(#luxuryGoldFoil)" stroke="url(#bevelEdgeRim)" stroke-width="1.2" stroke-linejoin="round">
                        
                        <!-- Precise Interlocking Layer 1: Left Pillar & Asymmetrical Serif Bases of 'N' -->
                        <path d="M 140 370 
                                 L 140 350 
                                 L 165 350 
                                 L 165 170 
                                 L 140 170 
                                 L 140 150 
                                 L 230 150 
                                 L 320 310 
                                 L 320 170 
                                 L 295 170 
                                 L 295 150 
                                 L 370 150 
                                 L 370 170 
                                 L 345 170 
                                 L 345 350 
                                 L 370 350 
                                 L 370 370 
                                 L 285 370 
                                 L 190 205 
                                 L 190 350 
                                 L 215 350 
                                 L 215 370 
                                 Z" />

                        <!-- Precise Interlocking Layer 2: The Intricate Swooping, Interwoven 'S' Loops -->
                        <path d="M 280 175 
                                 C 280 150, 335 145, 360 175 
                                 C 375 195, 365 225, 320 245 
                                 C 270 268, 245 282, 245 312 
                                 C 245 345, 280 365, 320 358 
                                 C 358 350, 375 315, 375 315 
                                 L 395 328 
                                 C 395 328, 370 385, 315 395 
                                 C 255 405, 205 368, 205 312 
                                 C 205 258, 255 238, 300 218 
                                 C 340 198, 338 185, 318 182 
                                 C 295 180, 285 195, 285 195 
                                 Z" />
                    </g>
                </svg>
            </div>

            <!-- Top Structural Frame Accent Rule Line -->
            <div class="gold-divider-line"></div>

            <!-- Authentic Core Brand Element Typography Header -->
            <h1 class="brand-title">NAPO STUDIOS</h1>

            <!-- Bottom Structural Frame Accent Rule Line -->
            <div class="gold-divider-line"></div>

        </div>
    </main>

    <!-- Fallback Smart Orientation Warning Interface Prompt -->
    <aside class="orientation-overlay">
        <div class="phone-icon-animation"></div>
        <p class="orientation-text">
            Please turn your device<br>to landscape orientation
        </p>
    </aside>

    <!-- Landscape System Configuration & Automation Scripts -->
    <script>
        /**
         * System engine logic targeting modern mobile hardware platforms
         * to command hardware sensor orientation adjustments instantly.
         */
        async function engageLandscapeLock() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (deviceLockError) {
                // System logs standard feedback fallback if hardware context denies early access execution
                console.log('Automated layout engine successfully deferred to overlay protocol.');
            }
        }

        // Activates immediate layout check sequences on user view initialize commands
        document.addEventListener('click', engageLandscapeLock);
        document.addEventListener('touchstart', engageLandscapeLock);
    </script>

</body>
</html>
