<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gumshoe Empire | Production Launcher</title>
    
    <!-- Optimized Font Loading: Pre-warmed connection for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Lexend:wght@700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. PRODUCTION ENVIRONMENT VARIABLES
           ========================================================================== */
        :root {
            --ui-black: #000000;
            --ui-charcoal: #0a0a0a;
            --ui-fluid-green: #4cb016;
            --ui-green-glow: #63d91f;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            
            --transition-smooth: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--ui-black);
            font-family: 'Fredoka', system-ui, sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* ==========================================================================
           2. FLUID UI ENGINE
           ========================================================================== */
        .viewport-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-areas: "main";
            overflow: hidden;
            position: relative;
        }

        .stage {
            grid-area: main;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: var(--safe-area-top) 1fr var(--safe-area-bottom);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            z-index: 1;
        }

        .stage.is-active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            z-index: 10;
        }

        /* Adaptive Background Architecture */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            background-color: var(--ui-charcoal);
        }

        /* Layout Grid for UI Elements */
        .ui-slot {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: clamp(20px, 8vh, 60px);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ==========================================================================
           3. UI COMPONENT MODULES
           ========================================================================== */
        .loading-tip {
            margin-bottom: 12px;
            text-align: center;
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(13px, 2.3vw, 18px);
            text-shadow: 2px 2px 5px rgba(0,0,0,.75);
        }

        .loading-text {
            margin-bottom: 14px;
            text-align: center;
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(15px, 2.8vw, 20px);
            text-shadow: 2px 2px 5px rgba(0,0,0,.75);
        }
        
        .loading-meter-container {
            width: 85%;
            height: 24px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2d2116;
            border-radius: 12px;
            padding: 3px;
            overflow: hidden;
        }

        .loading-meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--ui-fluid-green), var(--ui-green-glow));
            border-radius: 8px;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px rgba(76, 176, 22, 0.6);
        }

        .cta-button {
            width: 90%;
            max-width: 400px;
            padding: 18px 24px;
            margin: 10px 0;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .cta-button:active { transform: scale(0.96); }

        .btn-guest {
            background: linear-gradient(180deg, #72c613, #4a9405);
            color: #fff;
            border-bottom: 4px solid #1b4903;
        }

        .btn-google {
            background: #fff;
            color: #3c4043;
            border-bottom: 4px solid #999;
        }

        /* ==========================================================================
           4. RUNTIME LOGIC ENGINE
           ========================================================================== */
    </style>
</head>
<body>

    <div class="viewport-container" id="app-root">
        <!-- Splash -->
        <section class="stage is-active" id="screen-splash">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/napo_studio.png" class="bg-layer" alt="Splash Background">
        </section>

        <!-- Loading -->
        <section class="stage" id="screen-loading">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/loading_bg.png" class="bg-layer" alt="Loading Background">
            <div class="ui-slot">
                <div class="loading-meter-container">
                    <div class="loading-meter-fill" id="meter-fill"></div>
                </div>
            </div>
        </section>

        <!-- Menu -->
        <section class="stage" id="screen-menu">
            <img src="https://euduproassist.github.io/Gumshoe-Empire/assets/menu.png" class="bg-layer" alt="Menu Background">
            <div class="ui-slot">
                <button class="cta-button btn-guest" role="button" aria-label="Play as guest" tabindex="0">Play As Guest</button>
                <button class="cta-button btn-google" role="button" aria-label="Sign in with Google" tabindex="0">Sign In With Google</button>
            </div>
        </section>
    </div>

    <script>
        const AppEngine = {
            init: () => {
                const splash = document.getElementById('screen-splash');
                const loading = document.getElementById('screen-loading');
                const menu = document.getElementById('screen-menu');
                const meter = document.getElementById('meter-fill');

                setTimeout(() => {
                    splash.classList.remove('is-active');
                    loading.classList.add('is-active');
                    
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 1.5;
                        meter.style.width = `${progress}%`;
                        if (progress >= 100) {
                            clearInterval(interval);
                            loading.classList.remove('is-active');
                            menu.classList.add('is-active');
                        }
                    }, 40);
                }, 2500);
            }
        };

        window.onload = AppEngine.init;
    </script>
</body>
</html>
