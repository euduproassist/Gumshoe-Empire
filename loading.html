<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUMSHOE EMPIRE - Complete Pure CSS UI</title>
    
    <!-- Premium Google Fonts for Cartoon, Game, and Comic Typography Mapping -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=Russo+One&family=Special+Elite&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE RENDER ENGINE ENGINE & RESET CONFIGURATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* Hyper-Targeted Palette Sampling From Game Asset Graphic Pieces */
            --wood-darkest: #1e0e05;
            --wood-shadow: #3a2010;
            --wood-base: #78441b;
            --wood-mid: #945d2d;
            --wood-light: #b57c48;
            --wood-highlight: #dca76e;
            
            --text-main: #ffffff;
            --text-stroke: #1b0f08;
            --text-gold-light: #fff0be;
            --text-gold: #f8cb52;
            --text-gold-shadow: #c08716;
            
            --btn-blue-fill: #1964b7;
            --btn-blue-dark: #0e3f79;
            --btn-green-fill: #439a13;
            --btn-green-dark: #205406;
            
            --plaque-bg-main: #dfb274;
            --plaque-bg-dark: #b88b4d;
            --plaque-border: #4a2d12;
            
            --progress-container: #1b1109;
            --progress-stroke: #452915;
            --progress-fill-top: #82e717;
            --progress-fill-mid: #52a90c;
            --progress-fill-bot: #266400;
            
            --ambient-shadow-deep: rgba(0, 0, 0, 0.75);
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            background-color: #0b0908;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================================================
           2. RESPONSIVE VIEWPORT STAGE & HIGH-FIDELITY SCENE RENDERER
           ========================================================================== */
        .game-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 24px;
            position: relative;
            background: #25221c;
            z-index: 1;
            overflow: hidden;
        }

        /* 
           Pure CSS Mathematical Reconstruction of the Blurry Detective Office Scene.
           Uses structured CSS paint gradients to form the perspective room shapes.
        */
        .game-viewport::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* Window Frame Overlays */
                linear-gradient(90deg, transparent 65%, rgba(12, 10, 8, 0.4) 65%, rgba(12, 10, 8, 0.4) 90%, transparent 90%),
                /* Left Side Cork Pin Board Silhouette */
                linear-gradient(180deg, transparent 15%, #38291a 15%, #38291a 48%, transparent 48%),
                /* Vertical Perspective Edge Trims */
                linear-gradient(90deg, transparent 24%, rgba(0,0,0,0.15) 24%, rgba(0,0,0,0.15) 26%, transparent 26%),
                /* Horizontal Wall Mold Line Structuring */
                linear-gradient(180deg, transparent 70%, #1e1710 70%, #1e1710 72%, transparent 72%),
                /* Base Wall Color dropping down into Office Flooring Separation */
                linear-gradient(180deg, #534e43 0%, #423d33 70%, #2f373a 70%, #1f2528 100%);
            background-size: 100% 100%;
            z-index: -3;
        }

        /* Layered Atmospheric Blur Node to produce the exact photographic focus depth */
        .game-viewport::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 25%, rgba(0,0,0,0.5) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -2;
            pointer-events: none;
        }

        /* ==========================================================================
           3. CENTRAL CONTAINER SCALER ENGINE (ANTI-SIDEWAYS SCROLL)
           ========================================================================== */
        .gui-main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            margin: auto 0;
            transform-origin: center center;
            position: relative;
            z-index: 5;
        }

        /* ==========================================================================
           4. "GUMSHOE EMPIRE" CARTOON MULTI-PLANK SIGNBOARD ASSEMBLY
           ========================================================================== */
        .wood-logo-billboard {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, var(--wood-base) 0%, var(--wood-mid) 50%, var(--wood-base) 100%);
            border: 7px solid var(--text-stroke);
            border-radius: 24px;
            padding: 28px 20px 55px 20px;
            box-shadow: 
                0 14px 0 var(--wood-darkest),
                0 20px 30px var(--ambient-shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Curved outer edge frame structure matching the asset graphic silhouette */
            clip-path: polygon(3% 0%, 97% 0%, 100% 100%, 0% 100%);
        }

        /* Wood Fiber Texture Overlays */
        .wood-grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 1;
        }

        /* Wood Plank Isolation Joints */
        .wood-plank-joint {
            position: absolute;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--text-stroke);
            opacity: 0.85;
            pointer-events: none;
            z-index: 2;
        }
        .joint-alpha { top: 34%; }
        .joint-beta { top: 67%; }

        /* Embedded Vector Bullet Impact Fractures */
        .bullet-hole-vector {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #0f0a06;
            border-radius: 50%;
            box-shadow: 
                inset 3px 3px 5px rgba(0,0,0,0.9),
                0 0 0 5px var(--wood-highlight),
                0 0 0 7px var(--text-stroke);
            z-index: 10;
        }
        .bh-v1 { top: 31%; left: 7%; width: 18px; height: 18px; }
        .bh-v2 { top: 30%; left: 35%; }
        .bh-v3 { top: 28%; left: 56%; width: 17px; height: 17px; }
        .bh-v4 { top: 32%; left: 71%; }
        .bh-v5 { top: 64%; left: 18%; }
        .bh-v6 { top: 62%; left: 43%; width: 19px; height: 19px; }

        /* Typography Wrapper Layers */
        .title-text-wrap {
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .title-row {
            display: block;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: clamp(48px, 13vw, 72px);
            line-height: 0.82;
            color: var(--text-main);
            position: relative;
            /* Comic Extrusion Shadow Stacking Archetype */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  5px 0 var(--text-stroke),
                 0px  9px 0 var(--wood-darkest),
                 0px 14px 15px rgba(0,0,0,0.6);
            letter-spacing: -2px;
        }

        .title-row.gumshoe {
            transform: scaleX(0.95);
        }

        /* The Magnifying Glass Vector Element Embedded seamlessly within the letter 'O' */
        .magnifier-embedded-node {
            display: inline-block;
            position: relative;
            color: transparent;
            width: clamp(48px, 13vw, 72px);
        }

        .magnifier-embedded-node::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 2px;
            width: 85%;
            height: 85%;
            border: 8px solid var(--text-stroke);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 4px 0 var(--wood-darkest);
        }

        .magnifier-embedded-node::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: -2px;
            width: 10px;
            height: 26px;
            background: var(--text-stroke);
            border-radius: 4px;
            transform: rotate(-45deg);
            z-index: 3;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .title-row.empire {
            font-size: clamp(54px, 15vw, 84px);
            color: var(--text-gold);
            margin-top: 6px;
            letter-spacing: -1px;
            /* Multi-tier custom drop mapping specific to the gold coloration layer */
            text-shadow: 
                -4px -4px 0 var(--text-stroke),  
                 4px -4px 0 var(--text-stroke),
                -4px  4px 0 var(--text-stroke),
                 4px  4px 0 var(--text-stroke),
                 0px  4px 0 var(--text-gold-shadow),
                 0px  8px 0 var(--text-stroke),
                 0px 13px 0 var(--wood-darkest),
                 0px 18px 20px rgba(0,0,0,0.7);
        }

        /* ==========================================================================
           5. INTERLOCKING ACTION RIBBONS & GOLD SHERIFF BADGE STAR
           ========================================================================== */
        .ribbon-badge-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 108%;
            margin-top: -34px;
            z-index: 15;
            position: relative;
        }

        .ribbon-wing {
            padding: 10px 18px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(14px, 4vw, 20px);
            text-transform: uppercase;
            color: var(--text-main);
            border: 5px solid var(--text-stroke);
            box-shadow: 0 7px 0 var(--text-stroke);
            white-space: nowrap;
        }

        .ribbon-wing.left-blue {
            background: linear-gradient(180deg, var(--btn-blue-fill) 0%, var(--btn-blue-dark) 100%);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
            transform: rotate(-4deg) translateX(8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        .ribbon-wing.right-green {
            background: linear-gradient(180deg, var(--btn-green-fill) 0%, var(--btn-green-dark) 100%);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-left: none;
            transform: rotate(3deg) translateX(-8px);
            text-shadow: 2px 2px 0 var(--text-stroke);
        }

        /* High-fidelity procedural pure CSS star layout clip mapping */
        .center-star-badge {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ffe066 0%, var(--text-gold) 50%, var(--text-gold-shadow) 100%);
            border: 5px solid var(--text-stroke);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 71% 61%, 82% 100%, 50% 76%, 18% 100%, 29% 61%, 0% 38%, 37% 38%);
            z-index: 20;
            transform: scale(1.25) rotate(-5deg);
            filter: drop-shadow(0px 5px 0px var(--text-stroke));
        }

        /* ==========================================================================
           6. DESCRIPTION PLAQUE: "FROM LOW-GRADE P.I..."
           ========================================================================== */
        .description-plaque-shell {
            width: 90%;
            background: linear-gradient(180deg, var(--plaque-bg-main) 0%, var(--plaque-bg-dark) 100%);
            border: 5px solid var(--text-stroke);
            border-radius: 14px;
            padding: 14px 20px;
            margin-top: 14px;
            text-align: center;
            box-shadow: 
                0 9px 0 var(--plaque-border),
                0 6px 0 var(--text-stroke),
                0 15px 25px var(--ambient-shadow-deep);
            position: relative;
            z-index: 4;
        }

        /* Structural hardware fixings on flanking edges */
        .description-plaque-shell::before, .description-plaque-shell::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background: var(--plaque-border);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
        }
        .description-plaque-shell::before { left: 10px; }
        .description-plaque-shell::after { right: 10px; }

        .description-plaque-shell p {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(14px, 3.6vw, 19px);
            color: #241407;
            line-height: 1.25;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. PROGRESS LOADING TRACKER GROUP (LOWER POSITION ANCHOR)
           ========================================================================== */
        .loading-status-group {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            margin-bottom: 20px;
            z-index: 5;
        }

        .loading-title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(24px, 7vw, 32px);
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            /* Heavy text edge line shadow */
            text-shadow: 
                -3px -3px 0 var(--text-stroke),
                 3px -3px 0 var(--text-stroke),
                -3px  3px 0 var(--text-stroke),
                 3px  3px 0 var(--text-stroke),
                 2px  5px 4px rgba(0,0,0,0.8);
            animation: textPulseFrames 1.8s infinite ease-in-out;
        }

        /* Precise Progress Containment Shell */
        .progress-bar-shell {
            width: 100%;
            height: 28px;
            background: var(--progress-container);
            border: 5px solid var(--progress-stroke);
            border-radius: 40px;
            padding: 3px;
            box-shadow: 
                inset 0 5px 10px rgba(0,0,0,0.95),
                0 4px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            margin-bottom: 18px;
            position: relative;
        }

        /* Dynamic Fluid Fill Strips Layers matching exactly 60% snapshot */
        .progress-bar-fluid {
            width: 60%; 
            height: 100%;
            background: linear-gradient(180deg, var(--progress-fill-top) 0%, var(--progress-fill-mid) 45%, var(--progress-fill-bot) 100%);
            border-radius: 30px;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.6);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dynamic Gameplay Hints Display Box Contexts */
        .gameplay-tip-box {
            width: 95%;
            text-align: center;
            padding: 0 10px;
        }

        .gameplay-tip-box p {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 3.8vw, 17px);
            color: #f7dfbe;
            line-height: 1.35;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.8),
                 1px -1px 0 rgba(0,0,0,0.8),
                -1px  1px 0 rgba(0,0,0,0.8),
                 1px  1px 0 rgba(0,0,0,0.8),
                 0px 3px 4px rgba(0,0,0,1);
        }

        /* ==========================================================================
           8. MASTER ANIMATION SEQUENCING ENGINE
           ========================================================================== */
        @keyframes textPulseFrames {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(0.97); }
        }

        /* ==========================================================================
           9. HIGH-DENSITY ULTRA MOBILE RESPONSIVE ADAPTERS
           ========================================================================== */
        @media screen and (max-height: 700px) {
            .game-viewport { padding: 20px 16px; }
            .loading-status-group { margin-top: 25px; }
            .wood-logo-billboard { padding: 20px 14px 42px 14px; }
            .ribbon-badge-row { margin-top: -28px; }
        }
    </style>
</head>
<body>

    <!-- Main View Stage Control -->
    <main class="game-viewport" id="gameViewport">
        
        <!-- UI Container Component -->
        <div class="gui-main-container">
            
            <!-- Wooden Logo Billboard Frame -->
            <div class="wood-logo-billboard">
                <!-- Wood Texturing Layers -->
                <div class="wood-grain-overlay"></div>
                <div class="wood-plank-joint joint-alpha"></div>
                <div class="wood-plank-joint joint-beta"></div>

                <!-- Strategic Procedural Bullet Holes Vector Marks -->
                <div class="bullet-hole-vector bh-v1"></div>
                <div class="bullet-hole-vector bh-v2"></div>
                <div class="bullet-hole-vector bh-v3"></div>
                <div class="bullet-hole-vector bh-v4"></div>
                <div class="bullet-hole-vector bh-v5"></div>
                <div class="bullet-hole-vector bh-v6"></div>

                <!-- Graphic Letter Stacks -->
                <div class="title-text-wrap">
                    <h1 class="title-row gumshoe">
                        GUMSH<span class="magnifier-embedded-node">O</span>E
                    </h1>
                    <h1 class="title-row empire">EMPIRE</h1>
                </div>
            </div>

            <!-- Interlocking Subtitle Badges and Star Accent -->
            <div class="ribbon-badge-row">
                <div class="ribbon-wing left-blue">Start Small</div>
                <div class="center-star-badge"></div>
                <div class="ribbon-wing right-green">Crack Cases</div>
            </div>

            <!-- Middle Text Plaque Block Layer -->
            <div class="description-plaque-shell">
                <p>From Low-Grade P.I.<br>To The World's Best P.I.!</p>
            </div>
            
        </div>

        <!-- Lower Status Monitoring Component -->
        <div class="loading-status-group">
            <h2 class="loading-title-text">Loading...</h2>
            
            <!-- Meter Border Container Shell -->
            <div class="progress-bar-shell">
                <div class="progress-bar-fluid" id="mainProgressBarMeter"></div>
            </div>

            <!-- Context System Information Micro-Copy Tip -->
            <div class="gameplay-tip-box">
                <p>Tip: Check every detail. The truth is always in the evidence.</p>
            </div>
        </div>

    </main>

    <script>
        // Smooth presentation simulation engine loop for continuous load testing
        document.addEventListener("DOMContentLoaded", () => {
            const meterElement = document.getElementById("mainProgressBarMeter");
            let progressTrack = 60; // Initial value directly anchoring to visual representation layout
            
            const liveEngineLoop = setInterval(() => {
                if (progressTrack >= 100) {
                    progressTrack = 45; // Smooth loop resets safely for ongoing observation display
                } else {
                    progressTrack += Math.random() * 1.5;
                }
                meterElement.style.width = `${Math.min(progressTrack, 100)}%`;
            }, 300);
        });
    </script>
</body>
</html>
